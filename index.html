<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bio Vitalie — Saúde Integrativa</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>

<script>
  // Inicialização Única do Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyB8KlzpO2EGiyKon6gmG7C-KVDbYRg9ua8",
    authDomain: "biovitalie.firebaseapp.com",
    projectId: "biovitalie",
    storageBucket: "biovitalie.firebasestorage.app",
    messagingSenderId: "30768392130",
    appId: "1:30768392130:web:a01e297b728f7a6fe5d85b"
  };
  
  if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
  }

  const _auth = firebase.auth();
  const _db   = firebase.firestore();
  _auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

  // Ponte de comunicação Firebase -> React
  window._fb = {
    signIn: (e,p) => _auth.signInWithEmailAndPassword(e,p),
    signOut: () => _auth.signOut(),
    onAuth: (cb) => _auth.onAuthStateChanged(cb),
    getPatient: (id) => _db.collection('patients').doc(id).get(),
    setPatient: (id,d) => _db.collection('patients').doc(id).set(d, {merge:true}),
    updatePatient: (id,d) => _db.collection('patients').doc(id).update(d),
    deletePatient: (id) => _db.collection('patients').doc(id).delete(),
    onPatients: (cb) => _db.collection('patients').onSnapshot(cb),
    onPatient: (id,cb) => _db.collection('patients').doc(id).onSnapshot(cb),
  };
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<style>
/* Reset e Variáveis */
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --ink:#1c1712;--ink2:#3d3529;--ink3:#6b5f52;--muted:#a09181;
  --border:#e8dfd4;--border2:#f0e8df;--bg:#faf6f1;--bg2:#f4ede3;
  --card:#ffffff;--cream:#fdf8f2;
  --terra:#b5673a;--terra2:#d4845a;--terra3:#8c4e2a;
  --gold:#c4965a;--rose:#c47878;--sage:#6b8c6e;
  --grad:linear-gradient(135deg,#b5673a,#c4965a);
  --sh-sm:0 2px 12px rgba(28,23,18,.06);
  --sh-md:0 8px 32px rgba(28,23,18,.1);
  --sh-lg:0 20px 60px rgba(28,23,18,.15);
}

body{font-family:'Jost',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;}

/* Estrutura do App */
.shell{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg);position:relative;}
.shell-body{flex:1;overflow-y:auto;padding-bottom:100px;}

/* Login Screens */
.lg-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg);}
.lg-card{background:var(--card);border-radius:28px;padding:40px;width:100%;max-width:400px;box-shadow:var(--sh-lg);border:1px solid var(--border2);}
.lg-emblem{width:50px;height:50px;background:var(--grad);border-radius:15px;display:flex;align-items:center;justify-content:center;color:white;font-size:24px;margin-bottom:20px;}
.fi{width:100%;padding:14px;margin-bottom:12px;border-radius:12px;border:1.5px solid var(--border);outline:none;font-family:inherit;}
.btn-t{width:100%;padding:15px;background:var(--grad);border:none;border-radius:12px;color:white;font-weight:600;cursor:pointer;margin-top:10px;}

/* Dashboard e Cards */
.hero-av{width:44px;height:44px;border-radius:50%;background:var(--grad);color:white;display:flex;align-items:center;justify-content:center;font-weight:600;}
.cta-ci{background:var(--grad);border-radius:20px;padding:20px;color:white;display:flex;align-items:center;justify-content:space-between;margin:20px 24px;cursor:pointer;box-shadow:var(--sh-md);}
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--cream);border-top:1px solid var(--border2);display:flex;padding:12px 0;z-index:100;}
.tab-item{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;cursor:pointer;color:var(--muted);}
.tab-item.on{color:var(--terra);}

/* Admin Styles */
.adm-wrap{display:flex;min-height:100vh;}
.adm-side{width:240px;background:var(--ink);color:white;padding:30px 0;flex-shrink:0;}
.adm-main{flex:1;background:#f5f0ea;padding:40px;overflow-y:auto;}
.adm-nb{width:100%;padding:14px 24px;background:none;border:none;color:rgba(255,255,255,0.6);text-align:left;cursor:pointer;font-family:inherit;}
.adm-nb.on{background:rgba(255,255,255,0.05);color:white;border-left:4px solid var(--terra);}
.pt-card{background:white;padding:24px;border-radius:20px;margin-bottom:16px;box-shadow:var(--sh-sm);}

/* Toasts */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--ink);color:white;padding:12px 24px;border-radius:50px;z-index:1000;font-size:14px;}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const PHASES = [
  {id:1, name:'Autoconhecimento', months:'1–3', icon:'✦', days:90},
  {id:2, name:'Desparasitação', months:'4–6', icon:'◈', days:90},
  {id:3, name:'Detoxificação', months:'7–9', icon:'◇', days:90},
  {id:4, name:'Energização', months:'10–12', icon:'◉', days:90},
];

// Componente Principal
function App() {
  const [authState, setAuthState] = useState('loading');
  const [patient, setPatient] = useState(null);
  const [patients, setPatients] = useState([]);
  const [toast, setToast] = useState(null);

  const flash = (m) => {
    setToast(m);
    setTimeout(() => setToast(null), 2600);
  };

  useEffect(() => {
    const unsub = window._fb.onAuth(async (user) => {
      if (!user) {
        setAuthState('out');
        return;
      }
      if (user.email === 'admin@biovitalie.com') {
        setAuthState('admin');
      } else {
        const snap = await window._fb.getPatient(user.uid);
        if (snap.exists) {
          setPatient({ id: snap.id, ...snap.data() });
          setAuthState('patient');
        } else {
          setAuthState('out');
        }
      }
    });
    return () => unsub();
  }, []);

  const handleLogout = () => {
    window._fb.signOut();
    setAuthState('out');
    setPatient(null);
  };

  if (authState === 'loading') return <div style={{padding:100, textAlign:'center'}}>🌿 Bio Vitalie...</div>;
  if (authState === 'out') return <Login flash={flash} />;
  if (authState === 'admin') return <Admin onLogout={handleLogout} flash={flash} />;
  if (authState === 'patient' && patient) return <PatientApp patient={patient} onLogout={handleLogout} flash={flash} />;
  
  return null;
}

// Tela de Login
function Login({ flash }) {
  const [mode, setMode] = useState('patient');
  const [email, setEmail] = useState('');
  const [pw, setPw] = useState('');
  const [loading, setLoading] = useState(false);

  const handleGo = async () => {
    if (!email || !pw) return flash('Preencha todos os campos');
    setLoading(true);
    try {
      await window._fb.signIn(email, pw);
    } catch (e) {
      flash('Dados de acesso incorretos');
    }
    setLoading(false);
  };

  return (
    <div className="lg-bg">
      <div className="lg-card">
        <div className="lg-emblem">🌿</div>
        <h2 style={{fontFamily:'Libre Baskerville', marginBottom:10}}>Bio Vitalie</h2>
        <p style={{fontSize:13, color:'#666', marginBottom:24}}>Portal de Saúde Integrativa</p>
        
        <input className="fi" type="email" placeholder="E-mail" value={email} onChange={e=>setEmail(e.target.value)} />
        <input className="fi" type="password" placeholder="Senha" value={pw} onChange={e=>setPw(e.target.value)} />
        
        <button className="btn-t" onClick={handleGo} disabled={loading}>
          {loading ? 'A carregar...' : 'Entrar'}
        </button>
        
        <div style={{marginTop:20, textAlign:'center'}}>
           <button onClick={() => setMode(mode === 'patient' ? 'admin' : 'patient')} style={{background:'none', border:'none', fontSize:11, color:'#aaa', cursor:'pointer'}}>
             {mode === 'patient' ? 'Acesso Administrativo' : 'Acesso Paciente'}
           </button>
        </div>
      </div>
    </div>
  );
}

// Área da Paciente
function PatientApp({ patient, onLogout, flash }) {
  const [tab, setTab] = useState('home');
  const phase = PHASES.find(p => p.id === (patient.currentPhase || 1));

  return (
    <div className="shell">
      <div className="shell-body">
        <div style={{padding:'40px 24px 20px'}}>
           <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
              <div>
                <p style={{fontSize:12, color:'#999', textTransform:'uppercase'}}>Bem-vinda</p>
                <h2 style={{fontFamily:'Libre Baskerville'}}>{patient.name.split(' ')[0]}!</h2>
              </div>
              <div className="hero-av">{patient.name[0]}</div>
           </div>
        </div>

        <div className="cta-ci">
           <div>
              <p style={{fontWeight:600}}>Check-in do dia</p>
              <p style={{fontSize:12, opacity:0.8}}>Como se sente hoje?</p>
           </div>
           <span>✦</span>
        </div>

        <div style={{padding:'0 24px'}}>
           <div style={{background:'white', padding:20, borderRadius:20, border:'1.5px solid #f0e8df'}}>
              <p style={{fontSize:11, fontWeight:600, color:'#b5673a', marginBottom:8}}>FASE ATUAL</p>
              <h3 style={{fontFamily:'Libre Baskerville'}}>{phase.name}</h3>
              <p style={{fontSize:13, color:'#666', marginTop:4}}>{phase.months} meses de jornada</p>
           </div>
        </div>
      </div>

      <nav className="tab-bar">
        <button className={`tab-item ${tab==='home'?'on':''}`} onClick={()=>setTab('home')}><span>⌂</span><small>Início</small></button>
        <button className="tab-item" onClick={onLogout}><span>⎗</span><small>Sair</small></button>
      </nav>
    </div>
  );
}

// Painel Administrativo
function Admin({ onLogout, flash }) {
  const [patients, setPatients] = useState([]);
  const [tab, setTab] = useState('list');

  useEffect(() => {
    return window._fb.onPatients(snap => {
      setPatients(snap.docs.map(d => ({ id: d.id, ...d.data() })));
    });
  }, []);

  return (
    <div className="adm-wrap">
      <div className="adm-side">
        <div style={{padding:'0 24px 30px'}}>
           <h3 style={{fontFamily:'Libre Baskerville'}}>Bio Vitalie</h3>
           <small style={{color:'var(--terra)'}}>Painel Admin</small>
        </div>
        <button className={`adm-nb ${tab==='list'?'on':''}`} onClick={()=>setTab('list')}>Pacientes</button>
        <button className="adm-nb" onClick={onLogout}>Sair</button>
      </div>
      
      <div className="adm-main">
        <h1 style={{fontFamily:'Libre Baskerville', marginBottom:30}}>Gestão de Pacientes</h1>
        
        {patients.length === 0 ? <p>Nenhuma paciente encontrada.</p> : patients.map(p => (
          <div key={p.id} className="pt-card">
            <div style={{display:'flex', justifyContent:'space-between'}}>
              <div>
                <strong>{p.name}</strong>
                <p style={{fontSize:12, color:'#666'}}>{p.email}</p>
              </div>
              <div style={{background:'var(--bg2)', padding:'4px 12px', borderRadius:20, fontSize:11, fontWeight:600}}>
                Fase {p.currentPhase || 1}
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
