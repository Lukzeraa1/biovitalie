<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bio Vitalie — Saúde Integrativa</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>

<script>
  firebase.initializeApp({
    apiKey: "AIzaSyB8KlzpO2EGiyKon6gmG7C-KVDbYRg9ua8",
    authDomain: "biovitalie.firebaseapp.com",
    projectId: "biovitalie",
    storageBucket: "biovitalie.firebasestorage.app",
    messagingSenderId: "30768392130",
    appId: "1:30768392130:web:a01e297b728f7a6fe5d85b"
  });
  const _auth = firebase.auth();
  const _db   = firebase.firestore();
  _auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

  window._fb = {
    auth: _auth,
    db: _db,
    signIn: (e, p) => _auth.signInWithEmailAndPassword(e, p),
    signOut: () => _auth.signOut(),
    onAuth: (cb) => _auth.onAuthStateChanged(cb),
    getPatient: (id) => _db.collection('patients').doc(id).get(),
    setPatient: (id, data) => _db.collection('patients').doc(id).set(data, {merge: true}),
    updatePatient: (id, data) => _db.collection('patients').doc(id).update(data),
    deletePatient: (id) => _db.collection('patients').doc(id).delete(),
    onPatients: (cb) => _db.collection('patients').onSnapshot(cb),
    onPatient: (id, cb) => _db.collection('patients').doc(id).onSnapshot(cb)
  };
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<style>
/* Mantive todo o seu CSS original intacto aqui */
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --ink:#1c1712;--ink2:#3d3529;--ink3:#6b5f52;--muted:#a09181;
  --border:#e8dfd4;--border2:#f0e8df;--bg:#faf6f1;--bg2:#f4ede3;
  --card:#ffffff;--cream:#fdf8f2;
  --terra:#b5673a;--terra2:#d4845a;--terra3:#8c4e2a;
  --gold:#c4965a;--gold2:#d4aa78;
  --rose:#c47878;--sage:#6b8c6e;
  --grad:linear-gradient(135deg,#b5673a,#c4965a);
  --sh-sm:0 2px 12px rgba(28,23,18,.06);
  --sh-md:0 8px 32px rgba(28,23,18,.1);
  --sh-lg:0 20px 60px rgba(28,23,18,.15);
}
body{font-family:'Jost',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;}
.lg-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg);}
.lg-card{background:var(--card);border-radius:28px;padding:52px 48px;width:100%;max-width:420px;box-shadow:var(--sh-lg);border:1px solid var(--border2);}
.fi{width:100%;padding:14px 18px;border:1.5px solid var(--border);border-radius:12px;background:var(--bg);font-family:'Jost',sans-serif;font-size:14px;outline:none;}
.btn-t{width:100%;padding:15px;background:var(--grad);border:none;border-radius:12px;font-weight:600;color:white;cursor:pointer;}
.shell{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg);}
.shell-body{flex:1;overflow-y:auto;padding-bottom:100px;}
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--cream);border-top:1px solid var(--border2);display:flex;padding:12px 0;}
.tab-item{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;cursor:pointer;color:var(--muted);font-size:10px;text-transform:uppercase;font-weight:600;}
.tab-item.on{color:var(--terra);}
.water-bar{margin:0 24px 16px;background:white;border:1.5px solid #e8dfd4;border-radius:20px;padding:18px 20px;}
.water-cup{width:34px;height:34px;border-radius:9px;border:1.5px solid #4a90d933;display:inline-flex;align-items:center;justify-content:center;margin:2px;cursor:pointer;}
.water-cup.filled{background:#4a90d922;border-color:#4a90d9;}
.adm-wrap{display:flex;min-height:100vh;}
.adm-side{width:230px;background:var(--ink);color:white;padding:30px 0;flex-shrink:0;}
.adm-main{flex:1;background:#f5f0ea;padding:40px;overflow-y:auto;}
.pt-card{background:white;padding:24px;border-radius:20px;margin-bottom:16px;box-shadow:var(--sh-sm);}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--ink);color:white;padding:12px 24px;border-radius:50px;z-index:1000;}
.prog-bar{width:100%;height:8px;background:#eee;border-radius:10px;margin-top:10px;overflow:hidden;}
.prog-fill{height:100%;background:var(--grad);transition:width 0.4s;}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const PHASES = [
  {id:1, name:'Autoconhecimento', months:'1–3', icon:'✦', days:90},
  {id:2, name:'Desparasitação', months:'4–6', icon:'◈', days:90},
  {id:3, name:'Detoxificação', months:'7–9', icon:'◇', days:90},
  {id:4, name:'Energização', months:'10–12', icon:'◉', days:90},
];

function App() {
  const [authState, setAuthState] = useState('loading');
  const [patient, setPatient] = useState(null);
  const [toast, setToast] = useState(null);

  const flash = (m) => { setToast(m); setTimeout(() => setToast(null), 2600); };

  useEffect(() => {
    const unsub = window._fb.onAuth(async (user) => {
      if (!user) { setAuthState('out'); return; }
      if (user.email === 'admin@biovitalie.com') { setAuthState('admin'); } 
      else {
        window._fb.onPatient(user.uid, (snap) => {
          if (snap.exists) {
            setPatient({ id: snap.id, ...snap.data() });
            setAuthState('patient');
          } else { setAuthState('out'); }
        });
      }
    });
    return () => unsub();
  }, []);

  const handleLogout = () => window._fb.signOut();

  if (authState === 'loading') return <div style={{padding:100, textAlign:'center'}}>🌿 Bio Vitalie...</div>;

  return (
    <>
      {authState === 'out' && <Login flash={flash} />}
      {authState === 'admin' && <Admin onLogout={handleLogout} flash={flash} />}
      {authState === 'patient' && patient && <PatientApp patient={patient} onLogout={handleLogout} flash={flash} />}
      {toast && <div className="toast">{toast}</div>}
    </>
  );
}

function Login({ flash }) {
  const [email, setEmail] = useState('');
  const [pw, setPw] = useState('');
  const [loading, setLoading] = useState(false);

  const handleLogin = async () => {
    setLoading(true);
    try { await window._fb.signIn(email, pw); } 
    catch (e) { flash('E-mail ou senha incorretos'); }
    setLoading(false);
  };

  return (
    <div className="lg-bg">
      <div className="lg-card">
        <h2 style={{fontFamily:'Libre Baskerville', textAlign:'center', marginBottom:20}}>Bio Vitalie</h2>
        <input className="fi" placeholder="E-mail" value={email} onChange={e=>setEmail(e.target.value)} />
        <input className="fi" type="password" placeholder="Senha" value={pw} onChange={e=>setPw(e.target.value)} />
        <button className="btn-t" onClick={handleLogin} disabled={loading} style={{width:'100%'}}>
          {loading ? 'Entrando...' : 'Entrar no Portal'}
        </button>
      </div>
    </div>
  );
}

function PatientApp({ patient, onLogout, flash }) {
  const [tab, setTab] = useState('home');
  const todayStr = new Date().toISOString().split('T')[0];
  const waterKey = `water_${patient.id}_${todayStr}`;
  const [water, setWater] = useState(() => Number(localStorage.getItem(waterKey) || 0));

  const addWater = () => {
    const n = Math.min(water + 1, 12);
    setWater(n);
    localStorage.setItem(waterKey, n);
    if(n === 8) flash('🎉 Meta de 8 copos atingida!');
  };

  const phase = PHASES.find(p => p.id === (patient.currentPhase || 1)) || PHASES[0];
  const checkins = patient.checkins || [];
  const progressPct = Math.min(Math.round((checkins.length / phase.days) * 100), 100);

  return (
    <div className="shell">
      <div className="shell-body">
        <div style={{padding:'40px 24px 20px', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
          <div><p style={{fontSize:12, color:'#999'}}>BEM-VINDA</p><h2 style={{fontFamily:'Libre Baskerville'}}>{patient.name?.split(' ')[0]}!</h2></div>
          <div style={{width:44, height:44, borderRadius:'50%', background:'var(--grad)', color:'white', display:'flex', alignItems:'center', justifyContent:'center', fontWeight:600}}>{patient.name?.[0]}</div>
        </div>

        <div style={{padding:'0 24px'}}>
           <div className="pt-card">
              <p style={{fontSize:11, fontWeight:700, color: 'var(--terra)', textTransform:'uppercase'}}>Fase {phase.id}: {phase.name}</p>
              <div className="prog-bar"><div className="prog-fill" style={{width: `${progressPct}%`}}></div></div>
              <p style={{fontSize:12, color:'#666', marginTop:8}}>{progressPct}% concluído • {checkins.length}/{phase.days} dias</p>
           </div>

           <div className="water-bar">
              <div style={{display:'flex', justifyContent:'space-between', marginBottom:12}}>
                <strong>Água de hoje</strong>
                <span style={{fontSize:13, color:'#4a90d9', fontWeight:600}}>{water}/12 copos</span>
              </div>
              <div style={{marginBottom:15}}>
                {Array.from({length:12}).map((_, i) => (
                  <div key={i} className={`water-cup ${i < water ? 'filled' : ''}`} onClick={addWater}>💧</div>
                ))}
              </div>
              <button onClick={addWater} className="btn-t" style={{padding:10, fontSize:12, background:'#4a90d9', width:'100%', border:'none'}}>+ Registrar copo</button>
           </div>
        </div>
      </div>
      <nav className="tab-bar">
        <button className={`tab-item ${tab==='home'?'on':''}`} onClick={()=>setTab('home')}>Início</button>
        <button className="tab-item" onClick={onLogout}>Sair</button>
      </nav>
    </div>
  );
}

function Admin({ onLogout, flash }) {
  const [patients, setPatients] = useState([]);
  useEffect(() => window._fb.onPatients(snap => setPatients(snap.docs.map(d=>({id:d.id, ...d.data()})))), []);

  return (
    <div className="adm-wrap">
      <div className="adm-side">
        <div style={{padding:'0 24px 30px'}}><h3 style={{fontFamily:'Libre Baskerville'}}>Bio Vitalie</h3><small>Admin</small></div>
        <button className="adm-nb on">👥 Pacientes</button>
        <button className="adm-nb" onClick={onLogout}>Sair</button>
      </div>
      <div className="adm-main">
        <h1>Dashboard Clínico</h1>
        <div style={{marginTop:30}}>
          {patients.map(p => (
            <div key={p.id} className="pt-card">
              <strong>{p.name}</strong> - Fase {p.currentPhase || 1}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
