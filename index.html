<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bio Vitalie — Saúde Integrativa</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
<script>
  firebase.initializeApp({
    apiKey: "AIzaSyB8KlzpO2EGiyKon6gmG7C-KVDbYRg9ua8",
    authDomain: "biovitalie.firebaseapp.com",
    projectId: "biovitalie",
    storageBucket: "biovitalie.firebasestorage.app",
    messagingSenderId: "30768392130",
    appId: "1:30768392130:web:a01e297b728f7a6fe5d85b"
  });
  const _auth = firebase.auth();
  const _db   = firebase.firestore();
  _auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
  window._fb = {
    signIn: (e,p) => _auth.signInWithEmailAndPassword(e,p),
    signOut: () => _auth.signOut(),
    onAuth: (cb) => _auth.onAuthStateChanged(cb),
    getPatient: (id) => _db.collection('patients').doc(id).get(),
    setPatient: (id,d) => _db.collection('patients').doc(id).set(d, {merge:true}),
    updatePatient: (id,d) => _db.collection('patients').doc(id).update(d),
    deletePatient: (id) => _db.collection('patients').doc(id).delete(),
    onPatients: (cb) => _db.collection('patients').onSnapshot(cb),
    onPatient: (id,cb) => _db.collection('patients').doc(id).onSnapshot(cb),
  };
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --ink:#1c1712;--ink2:#3d3529;--muted:#a09181;
  --border:#e8dfd4;--border2:#f0e8df;--bg:#faf6f1;--card:#ffffff;
  --terra:#b5673a;--terra2:#d4845a;--grad:linear-gradient(135deg,#b5673a,#c4965a);
  --sh-md:0 8px 32px rgba(28,23,18,.1);--sh-lg:0 20px 60px rgba(28,23,18,.15);
}
body{font-family:'Jost',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}
.lg-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.lg-card{background:var(--card);border-radius:28px;padding:40px;width:100%;max-width:400px;box-shadow:var(--sh-lg);border:1px solid #f0e8df;}
.fi{width:100%;padding:14px;margin-bottom:12px;border-radius:12px;border:1.5px solid var(--border);outline:none;font-family:inherit;}
.btn-t{width:100%;padding:15px;background:var(--grad);border:none;border-radius:12px;color:white;font-weight:600;cursor:pointer;}
.adm-wrap{display:flex;min-height:100vh;}
.adm-side{width:230px;background:var(--ink);color:white;padding:30px 0;flex-shrink:0;position:sticky;top:0;height:100vh;}
.adm-main{flex:1;background:#f5f0ea;padding:40px;overflow-y:auto;}
.adm-nb{width:100%;padding:14px 24px;background:none;border:none;color:rgba(255,255,255,0.6);text-align:left;cursor:pointer;font-family:inherit;}
.adm-nb.on{background:rgba(255,255,255,0.05);color:white;border-left:4px solid var(--terra);}
.pt-card{background:white;padding:24px;border-radius:20px;margin-bottom:16px;box-shadow:var(--sh-sm);border:1px solid #e8dfd4;}
.btn-pri{background:var(--grad);color:white;border:none;padding:10px 18px;border-radius:10px;font-weight:600;cursor:pointer;}
.btn-sec{background:var(--bg);color:var(--ink);border:1px solid var(--border);padding:8px 14px;border-radius:10px;cursor:pointer;font-size:12px;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;}
.modal-box{background:#fdf8f2;width:100%;max-width:600px;border-radius:24px;padding:32px;max-height:90vh;overflow-y:auto;box-shadow:var(--sh-lg);}
.toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:var(--ink);color:white;padding:12px 24px;border-radius:50px;z-index:2000;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:15px;}
.tag-pill{background:rgba(181,103,58,0.1);color:var(--terra);padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:5px;margin:2px;}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const PHASES = [
  {id:1, name:'Autoconhecimento', months:'1–3'},
  {id:2, name:'Desparasitação', months:'4–6'},
  {id:3, name:'Detoxificação', months:'7–9'},
  {id:4, name:'Energização', months:'10–12'},
];

function App() {
  const [authState, setAuthState] = useState('loading');
  const [patient, setPatient] = useState(null);
  const [patients, setPatients] = useState([]);
  const [toast, setToast] = useState(null);

  const flash = m => { setToast(m); setTimeout(()=>setToast(null), 2600); };

  useEffect(() => {
    const unsub = window._fb.onAuth(async user => {
      if(!user){ setAuthState('out'); return; }
      if(user.email === 'admin@biovitalie.com') {
        window._fb.onPatients(snap => {
          setPatients(snap.docs.map(d => ({id:d.id, ...d.data()})));
          setAuthState('admin');
        });
      } else {
        const snap = await window._fb.getPatient(user.uid);
        if(snap.exists) { setPatient({id:snap.id, ...snap.data()}); setAuthState('patient'); }
        else setAuthState('out');
      }
    });
    return () => unsub();
  }, []);

  if(authState==='loading') return <div style={{padding:100, textAlign:'center'}}>🌿 Bio Vitalie...</div>;

  return (
    <>
      {authState==='out' && <Login flash={flash}/>}
      {authState==='admin' && <Admin patients={patients} onLogout={()=>window._fb.signOut()} flash={flash}/>}
      {authState==='patient' && <div style={{padding:50}}>Área do Paciente Online (Funcionalidades Restauradas)</div>}
      {toast && <div className="toast">{toast}</div>}
    </>
  );
}

function Login({ flash }) {
  const [email, setEmail] = useState('');
  const [pw, setPw] = useState('');
  const handleGo = async () => {
    try { await window._fb.signIn(email, pw); }
    catch (e) { flash('Erro nos dados de acesso'); }
  };
  return (
    <div className="lg-bg">
      <div className="lg-card">
        <h2 style={{fontFamily:'Libre Baskerville', textAlign:'center', marginBottom:20}}>Bio Vitalie</h2>
        <input className="fi" placeholder="E-mail" value={email} onChange={e=>setEmail(e.target.value)} />
        <input className="fi" type="password" placeholder="Senha" value={pw} onChange={e=>setPw(e.target.value)} />
        <button className="btn-t" onClick={handleGo} style={{width:'100%'}}>Entrar no Portal</button>
      </div>
    </div>
  );
}

function Admin({ patients, onLogout, flash }) {
  const [modal, setModal] = useState(null); // 'add' ou paciente_obj

  const handleDelete = async (id) => {
    if(confirm("Deseja remover esta paciente permanentemente?")) {
      await window._fb.deletePatient(id);
      flash("Paciente removida");
    }
  };

  const handleAdvance = async (p) => {
    if(p.currentPhase >= 4) return flash("Já está na última fase");
    await window._fb.updatePatient(p.id, { currentPhase: (p.currentPhase || 1) + 1 });
    flash("Fase avançada com sucesso!");
  };

  return (
    <div className="adm-wrap">
      <div className="adm-side">
        <div style={{padding:'0 24px 30px'}}><h3 style={{fontFamily:'Libre Baskerville'}}>Bio Vitalie</h3><small>Painel Admin</small></div>
        <button className="adm-nb on">👥 Pacientes</button>
        <button className="adm-nb" onClick={onLogout}>⎗ Sair</button>
      </div>
      <div className="adm-main">
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:32}}>
          <h1>Gestão de Pacientes</h1>
          <button className="btn-pri" onClick={() => setModal('add')}>+ Nova Paciente</button>
        </div>
        
        {patients.map(p => (
          <div key={p.id} className="pt-card">
            <div style={{display:'flex', justifyContent:'space-between', alignItems:'flex-start'}}>
              <div>
                <strong style={{fontSize:18}}>{p.name}</strong>
                <p style={{fontSize:13, color:'#666'}}>{p.email}</p>
                <div style={{marginTop:8}}>
                   <span className="tag-pill">Fase {p.currentPhase || 1}</span>
                   <span className="tag-pill">{p.checkins?.length || 0} check-ins</span>
                </div>
              </div>
              <div style={{display:'flex', gap:8}}>
                <button className="btn-sec" onClick={() => setModal(p)}>✏️ Editar</button>
                <button className="btn-sec" onClick={() => handleAdvance(p)}>↑ Evoluir</button>
                <button className="btn-sec" style={{color:'red'}} onClick={() => handleDelete(p.id)}>✕</button>
              </div>
            </div>
          </div>
        ))}

        {modal && (
          <PatientModal 
            data={modal === 'add' ? null : modal} 
            onClose={() => setModal(null)} 
            flash={flash} 
          />
        )}
      </div>
    </div>
  );
}

function PatientModal({ data, onClose, flash }) {
  const [form, setForm] = useState(data || {
    name: '', email: '', password: '', currentPhase: 1,
    canEat: [], cantEat: [], supplements: [], exams: []
  });
  
  const save = async () => {
    if(!form.name || !form.email) return flash("Nome e E-mail obrigatórios");
    const id = data ? data.id : "p" + Date.now();
    await window._fb.setPatient(id, form);
    flash("Dados salvos com sucesso!");
    onClose();
  };

  const addTag = (key, val) => {
    if(!val) return;
    setForm({...form, [key]: [...(form[key] || []), val]});
  };

  return (
    <div className="modal-bg">
      <div className="modal-box">
        <div style={{display:'flex', justifyContent:'space-between', marginBottom:20}}>
          <h2>{data ? "Editar Paciente" : "Nova Paciente"}</h2>
          <button onClick={onClose} style={{background:'none', border:'none', fontSize:24, cursor:'pointer'}}>×</button>
        </div>
        
        <div className="grid2">
          <div><label style={{fontSize:11, fontWeight:700}}>NOME</label><input className="fi" value={form.name} onChange={e=>setForm({...form, name:e.target.value})}/></div>
          <div><label style={{fontSize:11, fontWeight:700}}>E-MAIL</label><input className="fi" value={form.email} onChange={e=>setForm({...form, email:e.target.value})}/></div>
        </div>

        <div style={{marginTop:15}}>
          <label style={{fontSize:11, fontWeight:700}}>FASE INICIAL</label>
          <select className="fi" value={form.currentPhase} onChange={e=>setForm({...form, currentPhase: Number(e.target.value)})}>
            {PHASES.map(ph => <option key={ph.id} value={ph.id}>Fase {ph.id} - {ph.name}</option>)}
          </select>
        </div>

        <hr style={{margin:'20px 0', opacity:0.2}}/>
        
        <h3>Protocolo Alimentar</h3>
        <div className="grid2" style={{marginTop:10}}>
          <div>
            <input className="fi" placeholder="Pode comer..." onKeyDown={e => e.key === 'Enter' && (addTag('canEat', e.target.value), e.target.value='')}/>
            {form.canEat?.map((t,i) => <span key={i} className="tag-pill">{t}</span>)}
          </div>
          <div>
            <input className="fi" placeholder="Evitar..." onKeyDown={e => e.key === 'Enter' && (addTag('cantEat', e.target.value), e.target.value='')}/>
            {form.cantEat?.map((t,i) => <span key={i} className="tag-pill" style={{color:'red'}}>{t}</span>)}
          </div>
        </div>

        <button className="btn-t" onClick={save} style={{width:'100%', marginTop:30}}>Salvar Paciente</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
