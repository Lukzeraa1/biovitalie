<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bio Vitalie — Saúde Integrativa</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<!-- Firebase SDK (compat/UMD) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script>
  const firebaseConfig = {
    apiKey: "AIzaSyB8KlzpO2EGiyKon6gmG7C-KVDbYRg9ua8",
    authDomain: "biovitalie-3d35b.firebaseapp.com",
    projectId: "biovitalie-3d35b",
    storageBucket: "biovitalie-3d35b.appspot.com",
    messagingSenderId: "1028355606477",
    appId: "1:1028355606477:web:8a37955c42171c7d89069d"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const auth = firebase.auth();
  auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

  window.__vita = {
    db,
    auth,
    loadPatients: async () => {
      const snap = await db.collection("patients").get();
      return snap.docs.map(d => ({ id: d.id, ...d.data() }));
    },
    savePatient: async (patient) => {
      // Usa set com merge para garantir que o documento seja criado ou atualizado sem apagar campos extras
      await db.collection("patients").doc(patient.id).set(patient, { merge: true });
    },
    deletePatient: async (id) => {
      await db.collection("patients").doc(id).delete();
    },
    subscribePatients: (cb) => {
      // Este é o motor da sincronização: ele avisa o app sempre que algo muda no banco
      return db.collection("patients").onSnapshot(snap => {
        cb(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      });
    },
  };

  window.__vitaReady = true;
  window.dispatchEvent(new Event("vitaReady"));
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --ink:#1c1712;--ink2:#3d3529;--ink3:#6b5f52;--muted:#a09181;
  --border:#e8dfd4;--border2:#f0e8df;--bg:#faf6f1;--bg2:#f4ede3;
  --card:#ffffff;--cream:#fdf8f2;
  --terra:#b5673a;--terra2:#d4845a;--terra3:#8c4e2a;
  --gold:#c4965a;--gold2:#d4aa78;
  --rose:#c47878;--sage:#6b8c6e;
  --grad:linear-gradient(135deg,#b5673a,#c4965a);
  --sh-sm:0 2px 12px rgba(28,23,18,.06);
  --sh-md:0 8px 32px rgba(28,23,18,.1);
  --sh-lg:0 20px 60px rgba(28,23,18,.15);
}
body{font-family:'Jost',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pop{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
.a1{animation:fadeUp .5s cubic-bezier(.22,.68,0,1.2) both;}
.a2{animation:fadeUp .5s .08s cubic-bezier(.22,.68,0,1.2) both;}
.a3{animation:fadeUp .5s .16s cubic-bezier(.22,.68,0,1.2) both;}
.a4{animation:fadeUp .5s .24s cubic-bezier(.22,.68,0,1.2) both;}

/* LOGIN */
.lg-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(ellipse 80% 60% at 20% 100%,rgba(181,103,58,.12) 0%,transparent 60%),
             radial-gradient(ellipse 60% 80% at 80% 0%,rgba(196,150,90,.08) 0%,transparent 60%),var(--bg);}
.lg-card{background:var(--card);border-radius:28px;padding:52px 48px;width:100%;max-width:420px;
  box-shadow:var(--sh-lg);border:1px solid var(--border2);animation:pop .5s cubic-bezier(.22,.68,0,1.2) both;}
.lg-logotype{display:flex;align-items:center;gap:14px;margin-bottom:40px;}
.lg-emblem{width:46px;height:46px;background:var(--grad);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 6px 20px rgba(181,103,58,.3);}
.lg-brand{font-family:'Libre Baskerville',serif;font-size:22px;color:var(--ink);letter-spacing:.02em;}
.lg-brand span{display:block;font-family:'Jost',sans-serif;font-size:10px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-top:2px;}
.lg-h1{font-family:'Libre Baskerville',serif;font-size:26px;font-weight:400;line-height:1.3;margin-bottom:6px;}
.lg-h1 em{font-style:italic;color:var(--terra);}
.lg-sub{font-size:13px;color:var(--muted);margin-bottom:32px;letter-spacing:.02em;}
.fl{margin-bottom:18px;}
.fl label{display:block;font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.fi{width:100%;padding:14px 18px;border:1.5px solid var(--border);border-radius:12px;
  background:var(--bg);font-family:'Jost',sans-serif;font-size:14px;color:var(--ink);
  outline:none;transition:border-color .2s,box-shadow .2s;}
.fi:focus{border-color:var(--terra);box-shadow:0 0 0 3px rgba(181,103,58,.12);}
.fs{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:12px;
  background:var(--bg);font-family:'Jost',sans-serif;font-size:14px;color:var(--ink);
  outline:none;-webkit-appearance:none;transition:border-color .2s;}
.fs:focus{border-color:var(--terra);}
textarea.fi{resize:vertical;min-height:90px;}
.btn-t{width:100%;padding:15px;background:var(--grad);border:none;border-radius:12px;
  font-family:'Jost',sans-serif;font-size:14px;font-weight:600;letter-spacing:.06em;color:white;
  cursor:pointer;box-shadow:0 6px 24px rgba(181,103,58,.35);transition:transform .15s,box-shadow .15s;margin-top:4px;}
.btn-t:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(181,103,58,.42);}
.lg-sw{text-align:center;margin-top:22px;font-size:12px;color:var(--muted);letter-spacing:.04em;}
.lg-sw button{background:none;border:none;font-family:'Jost',sans-serif;font-size:12px;font-weight:600;
  color:var(--terra);cursor:pointer;text-decoration:underline;text-underline-offset:3px;}
.lg-dm{margin-top:14px;text-align:center;font-size:11px;color:var(--muted);background:var(--bg);border-radius:8px;padding:8px 12px;}

/* SHELL */
.shell{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg);}
.shell-body{flex:1;overflow-y:auto;padding-bottom:84px;}
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;
  background:rgba(253,248,242,.95);backdrop-filter:blur(20px);border-top:1px solid var(--border2);
  display:flex;padding:10px 0 16px;z-index:100;}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;
  background:none;border:none;cursor:pointer;font-family:'Jost',sans-serif;padding:4px 0;}
.tab-icon{font-size:21px;transition:transform .2s;}
.tab-label{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);transition:color .2s;}
.tab-dot{width:4px;height:4px;border-radius:50%;background:var(--terra);margin:0 auto;opacity:0;transition:opacity .2s;}
.tab-item.on .tab-label{color:var(--terra);}
.tab-item.on .tab-icon{transform:scale(1.15);}
.tab-item.on .tab-dot{opacity:1;}

/* HOME */
.home-hero{padding:32px 24px 24px;background:linear-gradient(180deg,var(--bg2) 0%,var(--bg) 100%);}
.hero-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;}
.hero-gr{font-size:11px;font-weight:500;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;}
.hero-nm{font-family:'Libre Baskerville',serif;font-size:28px;font-weight:400;margin-top:4px;line-height:1.2;}
.hero-nm em{font-style:italic;color:var(--terra);}
.hero-av{width:44px;height:44px;border-radius:50%;background:var(--grad);color:white;font-size:16px;font-weight:600;
  display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(181,103,58,.3);flex-shrink:0;}
.cta-ci{display:flex;align-items:center;gap:16px;
  background:linear-gradient(135deg,#c4845a,#d4a870);
  border-radius:20px;padding:18px 22px;
  cursor:pointer;box-shadow:0 8px 28px rgba(181,103,58,.28);transition:transform .15s,box-shadow .15s;}
.cta-ci:hover{transform:translateY(-2px);box-shadow:0 12px 36px rgba(181,103,58,.38);}
.cta-ci-ic{width:44px;height:44px;flex-shrink:0;border-radius:14px;background:rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;font-size:20px;}
.cta-ci-txt{flex:1;}
.cta-ci-title{color:white;font-size:15px;font-weight:600;letter-spacing:.02em;}
.cta-ci-sub{color:rgba(255,255,255,.7);font-size:12px;margin-top:2px;}
.cta-ci-arr{color:rgba(255,255,255,.6);font-size:24px;font-weight:300;}
.sec-pad{padding:0 24px;}
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin:22px 0 14px;}
.sec-title{font-family:'Libre Baskerville',serif;font-size:17px;font-weight:400;letter-spacing:.01em;}
.sec-lnk{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--terra);background:none;border:none;cursor:pointer;font-family:'Jost',sans-serif;}

/* JOURNEY */
.j-rail{display:flex;gap:10px;overflow-x:auto;padding:14px 24px 8px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.j-rail::-webkit-scrollbar{display:none;}
.ph-tile{flex-shrink:0;width:124px;border-radius:18px;padding:22px 14px 16px;
  display:flex;flex-direction:column;align-items:center;gap:10px;
  position:relative;cursor:pointer;transition:transform .2s,box-shadow .2s;border:1.5px solid transparent;}
.ph-tile:hover{transform:translateY(-2px);}
.ph-tile.active{background:var(--card);border-color:var(--terra);box-shadow:0 8px 28px rgba(181,103,58,.15);}
.ph-tile.done{background:rgba(107,140,110,.07);border-color:rgba(107,140,110,.25);}
.ph-tile.locked{background:var(--bg2);opacity:.55;}
.ph-badge{position:absolute;top:-12px;left:50%;transform:translateX(-50%);
  background:var(--terra);color:white;font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  padding:4px 12px;border-radius:20px;white-space:nowrap;box-shadow:0 2px 8px rgba(181,103,58,.3);}
.ph-badge.done-b{background:var(--sage);}
.ph-orb{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:18px;background:var(--bg2);}
.ph-tile.active .ph-orb{background:rgba(181,103,58,.12);}
.ph-tile.done .ph-orb{background:rgba(107,140,110,.12);}
.ph-nm{font-size:11px;font-weight:600;text-align:center;letter-spacing:.02em;color:var(--ink2);}
.ph-mo{font-size:10px;color:var(--muted);font-weight:400;}

/* WEEK */
.week-card{margin:0 24px;background:var(--card);border-radius:20px;padding:20px;
  border:1px solid var(--border2);box-shadow:var(--sh-sm);}
.week-row{display:flex;gap:4px;justify-content:space-between;margin-bottom:14px;}
.day-pip{flex:1;max-width:44px;aspect-ratio:1;border-radius:50%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
  font-size:10px;font-weight:600;color:var(--muted);background:var(--bg);transition:all .2s;}
.day-pip.today{background:var(--ink);color:white;}
.day-pip.chkd{background:var(--grad);color:white;box-shadow:0 4px 14px rgba(181,103,58,.3);}
.week-ft{display:flex;align-items:center;justify-content:space-between;}
.week-lbl{font-size:12px;color:var(--muted);font-weight:400;letter-spacing:.03em;}
.week-cnt{font-family:'Libre Baskerville',serif;font-size:20px;font-weight:700;color:var(--ink);}

/* PHASE DESC */
.ph-desc{margin:16px 24px 0;background:linear-gradient(135deg,rgba(181,103,58,.07),rgba(196,150,90,.05));
  border:1px solid rgba(181,103,58,.15);border-radius:20px;padding:20px 22px;}
.ph-desc-nm{font-family:'Libre Baskerville',serif;font-size:16px;font-weight:400;margin-bottom:6px;}
.ph-desc-tx{font-size:13px;color:var(--ink3);line-height:1.65;}

/* CONTENT ITEMS */
.c-block{padding:0 24px;}
.c-item{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--border2);
  border-radius:12px;padding:14px 16px;margin-bottom:8px;cursor:pointer;
  transition:transform .15s,box-shadow .15s,border-color .15s;}
.c-item:hover{transform:translateX(3px);border-color:var(--border);box-shadow:var(--sh-sm);}
.c-ico{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;background:var(--bg2);}
.c-ico.ex{background:rgba(196,150,90,.12);}
.c-ico.med{background:rgba(107,140,110,.12);}
.c-ico.rec{background:rgba(196,120,120,.1);}
.c-ico.exam{background:rgba(100,140,200,.1);}
.c-info{flex:1;}
.c-name{font-size:14px;font-weight:500;color:var(--ink);letter-spacing:.01em;}
.c-meta{font-size:11px;color:var(--muted);margin-top:3px;}
.c-chev{color:var(--border);font-size:18px;}

/* OVERLAY / SHEET */
.overlay{position:fixed;inset:0;background:rgba(28,23,18,.6);backdrop-filter:blur(6px);
  z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .25s ease;}
.sheet{background:var(--cream);border-radius:28px 28px 0 0;width:100%;max-width:430px;
  max-height:92vh;overflow-y:auto;padding:24px 24px 44px;animation:fadeUp .35s cubic-bezier(.22,.68,0,1.2);}
.sh-handle{width:36px;height:3.5px;background:var(--border);border-radius:4px;margin:0 auto 22px;}
.sh-title{font-family:'Libre Baskerville',serif;font-size:22px;font-weight:400;margin-bottom:4px;}
.sh-sub{font-size:13px;color:var(--muted);margin-bottom:24px;}
.f-lbl{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;display:block;}

/* MOOD */
.mood-strip{display:flex;gap:6px;margin-bottom:20px;}
.mood-btn{flex:1;padding:11px 6px;border:1.5px solid var(--border);border-radius:12px;
  background:white;display:flex;flex-direction:column;align-items:center;gap:5px;
  cursor:pointer;transition:all .15s;font-family:'Jost',sans-serif;}
.mood-btn.sel{border-color:var(--terra);background:rgba(181,103,58,.07);}
.mood-em{font-size:20px;}
.mood-lb{font-size:10px;font-weight:600;letter-spacing:.06em;color:var(--muted);}
.mood-btn.sel .mood-lb{color:var(--terra);}

/* SCALE */
.scale-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:18px 0;}
.scale-ttl{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.sq-row{display:flex;gap:5px;}
.sq{flex:1;height:38px;border-radius:8px;background:var(--bg2);cursor:pointer;transition:all .15s;}
.sq.e.on{background:var(--gold);}
.sq.s.on{background:var(--sage);}

/* SLIDER */
.sl-block{margin-bottom:20px;}
.sl-lbl{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);
  margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.sl-val{margin-left:auto;color:var(--terra);font-size:13px;font-weight:600;}
input[type=range]{width:100%;accent-color:var(--terra);cursor:pointer;}

/* TAGS */
.tag-cloud{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:20px;}
.sym-tag{padding:8px 14px;border-radius:30px;border:1.5px solid var(--border);
  font-family:'Jost',sans-serif;font-size:12px;font-weight:500;cursor:pointer;background:white;color:var(--ink2);transition:all .15s;}
.sym-tag.on{background:rgba(181,103,58,.09);border-color:var(--terra);color:var(--terra);}

/* TOGGLES */
.tog-row{display:flex;gap:10px;margin-bottom:20px;}
.tog-btn{flex:1;padding:14px;border:1.5px solid var(--border);border-radius:12px;
  background:white;cursor:pointer;font-family:'Jost',sans-serif;font-size:13px;font-weight:500;
  letter-spacing:.03em;color:var(--ink2);transition:all .15s;text-align:center;}
.tog-btn.on{border-color:var(--sage);background:rgba(107,140,110,.09);color:var(--sage);}

.btn-reg{width:100%;padding:16px;background:var(--ink);border:none;border-radius:12px;
  color:white;font-family:'Jost',sans-serif;font-size:14px;font-weight:600;letter-spacing:.06em;
  cursor:pointer;transition:background .2s,transform .15s;margin-top:8px;}
.btn-reg:hover{background:var(--ink2);transform:translateY(-1px);}
.btn-cancel{width:100%;padding:14px;background:none;border:none;font-family:'Jost',sans-serif;
  font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;margin-top:8px;letter-spacing:.04em;}

/* PLANO */
.plano-hero{padding:32px 24px 20px;background:linear-gradient(180deg,var(--bg2) 0%,transparent 100%);}
.plano-t{font-family:'Libre Baskerville',serif;font-size:26px;font-weight:400;}
.plano-t em{font-style:italic;color:var(--terra);}
.plano-s{font-size:12px;color:var(--muted);margin-top:4px;letter-spacing:.04em;}
.coming-card{margin:0 24px 16px;background:var(--ink);border-radius:20px;padding:18px 20px;
  display:flex;align-items:center;gap:16px;cursor:pointer;opacity:.88;}
.coming-ic{width:42px;height:42px;background:rgba(255,255,255,.1);border-radius:12px;
  display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;}
.coming-title{color:white;font-size:14px;font-weight:600;letter-spacing:.02em;}
.coming-sub{color:rgba(255,255,255,.45);font-size:11px;margin-top:2px;}
.rem-card{margin:0 24px 10px;background:var(--card);border:1px solid var(--border2);border-radius:12px;
  padding:16px;display:flex;align-items:flex-start;gap:14px;box-shadow:var(--sh-sm);}
.rem-ico{font-size:18px;flex-shrink:0;margin-top:2px;color:var(--terra);}
.rem-body{flex:1;}
.rem-nm{font-size:14px;font-weight:500;color:var(--ink);}
.rem-desc{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.5;}
.rem-time{font-size:11px;color:var(--muted);margin-top:5px;}
.rem-acts{display:flex;gap:6px;flex-shrink:0;}
.r-btn{background:none;border:none;cursor:pointer;font-size:19px;padding:2px;transition:transform .15s;}
.r-btn:hover{transform:scale(1.2);}
.food-panel{margin:0 24px 12px;border-radius:20px;overflow:hidden;border:1px solid var(--border2);}
.food-ph{padding:14px 18px;font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;}
.food-ph.can{background:rgba(107,140,110,.09);color:var(--sage);}
.food-ph.cant{background:rgba(181,103,58,.07);color:var(--terra);}
.food-pb{padding:14px 18px;background:var(--card);display:flex;flex-wrap:wrap;gap:7px;}
.food-pill{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid;}
.food-pill.can{background:rgba(107,140,110,.08);border-color:rgba(107,140,110,.25);color:var(--sage);}
.food-pill.cant{background:rgba(181,103,58,.07);border-color:rgba(181,103,58,.2);color:var(--terra);}
.suppl-row{margin:0 24px 8px;background:var(--card);border:1px solid var(--border2);border-radius:12px;
  padding:14px 18px;display:flex;align-items:center;gap:12px;box-shadow:var(--sh-sm);}
.suppl-nm{font-size:14px;font-weight:500;flex:1;}
.suppl-ds{font-size:12px;color:var(--muted);}

/* PERFIL */
.perf-hero{background:var(--ink);padding:40px 24px 32px;display:flex;align-items:center;gap:18px;}
.perf-av{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.12);
  color:white;font-size:22px;font-weight:600;display:flex;align-items:center;justify-content:center;
  border:2px solid rgba(255,255,255,.2);}
.perf-nm{color:white;font-family:'Libre Baskerville',serif;font-size:20px;font-weight:400;}
.perf-em{color:rgba(255,255,255,.5);font-size:12px;margin-top:3px;}
.stats-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border2);border-bottom:1px solid var(--border2);}
.stat-tile{background:var(--card);padding:16px 10px;text-align:center;}
.stat-v{font-family:'Libre Baskerville',serif;font-size:22px;font-weight:700;}
.stat-v.ex{color:var(--gold);}
.stat-v.med{color:var(--sage);}
.stat-v.rec{color:var(--rose);}
.stat-v.chk{color:var(--terra);}
.stat-l{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:4px;}
.perf-body{padding:24px;}
.perf-sec{font-family:'Libre Baskerville',serif;font-size:16px;font-weight:400;margin:20px 0 12px;}
.tag-opt{padding:8px 15px;border-radius:30px;border:1.5px solid var(--border);
  font-family:'Jost',sans-serif;font-size:12px;font-weight:500;cursor:pointer;background:white;color:var(--ink2);transition:all .15s;}
.tag-opt.on{background:rgba(181,103,58,.09);border-color:var(--terra);color:var(--terra);}
.logout-lnk{display:flex;align-items:center;justify-content:center;gap:8px;background:none;border:none;
  font-family:'Jost',sans-serif;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;
  padding:16px;width:100%;margin-top:8px;letter-spacing:.04em;transition:color .2s;}
.logout-lnk:hover{color:var(--terra);}

/* ADMIN */
.adm-wrap{display:flex;min-height:100vh;}
.adm-side{width:230px;background:var(--ink);flex-shrink:0;padding:36px 0;
  display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;}
.adm-brand{padding:0 24px 28px;border-bottom:1px solid rgba(255,255,255,.07);margin-bottom:20px;}
.adm-brand-nm{font-family:'Libre Baskerville',serif;font-size:19px;color:white;font-weight:400;}
.adm-brand-sb{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-top:3px;}
.adm-nb{display:flex;align-items:center;gap:12px;padding:12px 24px;color:rgba(255,255,255,.45);
  cursor:pointer;font-size:13px;font-weight:500;border-left:2.5px solid transparent;
  background:none;border-right:none;border-top:none;border-bottom:none;
  font-family:'Jost',sans-serif;width:100%;text-align:left;transition:all .2s;letter-spacing:.03em;}
.adm-nb:hover{color:rgba(255,255,255,.85);background:rgba(255,255,255,.04);}
.adm-nb.on{color:white;background:rgba(181,103,58,.12);border-left-color:var(--terra);}
.adm-side-foot{margin-top:auto;padding:24px;border-top:1px solid rgba(255,255,255,.07);}
.adm-main{flex:1;background:#f5f0ea;overflow-y:auto;padding:40px 48px;}
.adm-ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:32px;}
.adm-pt{font-family:'Libre Baskerville',serif;font-size:30px;font-weight:400;}
.adm-ps{font-size:12px;color:var(--muted);margin-top:4px;letter-spacing:.04em;}
.adm-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:28px;}
.adm-stat{background:white;border-radius:20px;padding:22px;display:flex;align-items:center;gap:16px;
  box-shadow:var(--sh-sm);border:1px solid var(--border2);}
.adm-stat-ic{width:48px;height:48px;border-radius:14px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.adm-stat-v{font-family:'Libre Baskerville',serif;font-size:30px;font-weight:700;color:var(--terra);line-height:1;}
.adm-stat-l{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-top:4px;}
.adm-card{background:white;border-radius:20px;padding:24px;margin-bottom:18px;box-shadow:var(--sh-sm);border:1px solid var(--border2);}
.adm-card-t{font-family:'Libre Baskerville',serif;font-size:17px;font-weight:400;margin-bottom:18px;}
.pt-row{display:flex;align-items:center;gap:14px;padding:12px 0;border-bottom:1px solid var(--border2);}
.pt-row:last-child{border-bottom:none;padding-bottom:0;}
.pt-av{width:38px;height:38px;border-radius:50%;background:var(--grad);color:white;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.pt-info{flex:1;}
.pt-nm{font-size:14px;font-weight:500;color:var(--ink);}
.pt-mt{font-size:11px;color:var(--muted);margin-top:2px;}
.pt-ph-tag{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;
  background:rgba(181,103,58,.1);color:var(--terra);letter-spacing:.03em;white-space:nowrap;}
.pt-acts{display:flex;gap:6px;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:10px 18px;border-radius:10px;border:none;cursor:pointer;
  font-family:'Jost',sans-serif;font-size:13px;font-weight:600;transition:all .15s;letter-spacing:.03em;}
.btn-pri{background:var(--grad);color:white;box-shadow:0 4px 16px rgba(181,103,58,.3);}
.btn-pri:hover{transform:translateY(-1px);box-shadow:0 6px 22px rgba(181,103,58,.38);}
.btn-sec{background:white;color:var(--ink);border:1.5px solid var(--border);}
.btn-sec:hover{background:var(--bg2);}
.btn-gho{background:rgba(181,103,58,.08);color:var(--terra);border:1.5px solid rgba(181,103,58,.2);}
.btn-gho:hover{background:rgba(181,103,58,.14);}
.btn-dan{background:rgba(196,120,120,.1);color:var(--rose);border:1.5px solid rgba(196,120,120,.25);}
.btn-sm{padding:7px 13px;font-size:11px;}
.prog-wrap{background:var(--bg2);border-radius:20px;height:5px;overflow:hidden;margin-top:8px;}
.prog-fill{height:100%;border-radius:20px;background:var(--grad);transition:width .5s cubic-bezier(.22,.68,0,1.2);}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(28,23,18,.6);backdrop-filter:blur(6px);
  z-index:300;display:flex;align-items:center;justify-content:center;padding:24px;animation:fadeIn .2s ease;}
.modal-box{background:var(--cream);border-radius:24px;width:100%;max-width:580px;max-height:88vh;
  overflow-y:auto;padding:36px;box-shadow:var(--sh-lg);animation:pop .3s cubic-bezier(.22,.68,0,1.2);}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;}
.modal-ttl{font-family:'Libre Baskerville',serif;font-size:22px;font-weight:400;}
.modal-cls{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);padding:2px;transition:color .2s;}
.modal-cls:hover{color:var(--ink);}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;margin-top:24px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.divv{border:none;border-top:1px solid var(--border2);margin:20px 0;}
.ml{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:16px 0 10px;}
.t-inp{display:flex;gap:8px;margin-top:8px;}
.t-inp input{flex:1;padding:9px 14px;border:1.5px solid var(--border);border-radius:9px;
  font-family:'Jost',sans-serif;font-size:13px;outline:none;background:var(--bg);color:var(--ink);}
.t-inp input:focus{border-color:var(--terra);}
.tags-d{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
.t-pill{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;display:flex;align-items:center;gap:6px;}
.t-pill.g{background:rgba(107,140,110,.1);color:var(--sage);border:1px solid rgba(107,140,110,.25);}
.t-pill.r{background:rgba(181,103,58,.08);color:var(--terra);border:1px solid rgba(181,103,58,.2);}
.t-pill-x{cursor:pointer;opacity:.5;font-size:14px;transition:opacity .15s;}
.t-pill-x:hover{opacity:1;}
.s-row{display:flex;align-items:center;gap:10px;background:var(--bg2);border-radius:10px;padding:10px 14px;margin-bottom:7px;}
.s-num{width:24px;height:24px;border-radius:50%;background:var(--terra);color:white;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.s-txt{flex:1;font-size:13px;font-weight:500;}
.s-del{background:none;border:none;cursor:pointer;color:var(--border);font-size:17px;transition:color .15s;}
.s-del:hover{color:var(--terra);}
.chk-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border2);}
.chk-row:last-child{border-bottom:none;}
.chk-dt{font-size:12px;color:var(--muted);font-weight:500;width:82px;flex-shrink:0;}
.chk-mood{font-size:18px;}
.chk-pills{display:flex;gap:5px;flex-wrap:wrap;flex:1;}
.chk-pill{padding:3px 9px;border-radius:8px;font-size:11px;font-weight:500;background:var(--bg2);color:var(--ink3);}
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%);background:var(--ink);color:white;
  padding:12px 24px;border-radius:12px;font-size:13px;font-weight:500;letter-spacing:.03em;
  z-index:500;animation:fadeUp .3s cubic-bezier(.22,.68,0,1.2);box-shadow:var(--sh-lg);white-space:nowrap;}

/* JOURNEY PROGRESS CARD */
.j-progress-card{margin:0 24px;background:var(--card);border-radius:20px;padding:22px;
  border:1px solid var(--border2);box-shadow:var(--sh-sm);}
.j-prog-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;}
.j-prog-where{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
.j-prog-phase{font-family:'Libre Baskerville',serif;font-size:17px;font-weight:400;margin-bottom:2px;}
.j-prog-phase em{font-style:italic;color:var(--terra);}
.j-prog-next{font-size:12px;color:var(--muted);margin-bottom:14px;}
.j-prog-next strong{color:var(--terra);font-weight:600;}
.j-prog-bar-wrap{background:var(--bg2);border-radius:20px;height:6px;overflow:hidden;margin-bottom:10px;}
.j-prog-bar{height:100%;border-radius:20px;background:var(--grad);transition:width .6s cubic-bezier(.22,.68,0,1.2);}
.j-prog-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);}
.j-prog-days-done{font-weight:600;color:var(--terra);}

/* WEEK MESSAGE */
.week-msg{margin-top:10px;padding:10px 14px;background:linear-gradient(135deg,rgba(181,103,58,.07),rgba(196,150,90,.05));
  border-radius:10px;border-left:3px solid var(--terra);font-size:13px;color:var(--ink2);line-height:1.5;}
.week-msg strong{color:var(--terra);font-weight:600;}

/* ACTIVITY CARD */
.act-card{margin:0 24px 12px;background:var(--card);border:1px solid var(--border2);border-radius:20px;
  overflow:hidden;box-shadow:var(--sh-sm);}
.act-card-head{padding:16px 20px 12px;display:flex;align-items:center;gap:10px;}
.act-card-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.act-card-icon.ex{background:rgba(196,150,90,.15);}
.act-card-icon.med{background:rgba(107,140,110,.15);}
.act-card-icon.food{background:rgba(196,120,120,.12);}
.act-card-icon.exam{background:rgba(100,140,200,.12);}
.act-card-q{font-family:'Libre Baskerville',serif;font-size:15px;font-weight:400;}
.act-card-q em{font-style:italic;color:var(--terra);}
.act-card-items{padding:0 12px 14px;display:flex;flex-direction:column;gap:7px;}
.act-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:12px;
  background:var(--bg);cursor:pointer;border:1.5px solid transparent;
  transition:all .15s;}
.act-item:hover{border-color:var(--border);background:var(--bg2);}
.act-item.done-item{background:rgba(107,140,110,.08);border-color:rgba(107,140,110,.25);}
.act-item-ic{font-size:20px;flex-shrink:0;}
.act-item-info{flex:1;}
.act-item-name{font-size:13px;font-weight:500;color:var(--ink);}
.act-item-dur{font-size:11px;color:var(--muted);margin-top:2px;}
.act-item-check{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s;}
.act-item.done-item .act-item-check{background:var(--sage);border-color:var(--sage);color:white;font-size:11px;}

/* FOOD CARD INLINE */
.food-inline{padding:0 12px 14px;}
.food-section{margin-bottom:12px;}
.food-sec-label{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  padding:0 6px;margin-bottom:8px;}
.food-sec-label.can{color:var(--sage);}
.food-sec-label.cant{color:var(--terra);}
.food-pills-row{display:flex;flex-wrap:wrap;gap:6px;padding:0 6px;}
.fp{padding:6px 13px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid;}
.fp.can{background:rgba(107,140,110,.08);border-color:rgba(107,140,110,.25);color:var(--sage);}
.fp.cant{background:rgba(181,103,58,.07);border-color:rgba(181,103,58,.2);color:var(--terra);}

/* WATER TRACKER */
.water-bar{margin:0 24px 16px;background:linear-gradient(135deg,rgba(74,144,217,.07),rgba(74,144,217,.03));
  border:1.5px solid rgba(74,144,217,.2);border-radius:20px;padding:18px 20px;box-shadow:var(--sh-sm);}
.water-bar-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.water-bar-title{font-family:'Libre Baskerville',serif;font-size:15px;font-weight:400;}
.water-bar-title em{font-style:italic;color:#4a90d9;}
.water-count-wrap{display:flex;align-items:baseline;gap:4px;}
.water-count{font-family:'Libre Baskerville',serif;font-size:26px;font-weight:700;color:#4a90d9;line-height:1;}
.water-count-of{font-size:13px;color:var(--muted);font-family:'Jost',sans-serif;}
.water-cups{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
.water-cup{width:34px;height:34px;border-radius:9px;border:1.5px solid rgba(74,144,217,.2);
  background:white;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:16px;transition:all .2s;flex-shrink:0;}
.water-cup.filled{background:rgba(74,144,217,.15);border-color:rgba(74,144,217,.5);}
.water-cup:active{transform:scale(.88);}
.water-cta{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;
  background:rgba(74,144,217,.12);border:1.5px solid rgba(74,144,217,.3);
  border-radius:12px;cursor:pointer;font-family:'Jost',sans-serif;
  font-size:14px;font-weight:600;color:#4a90d9;transition:all .2s;width:100%;}
.water-cta:hover{background:rgba(74,144,217,.2);transform:translateY(-1px);}
.water-msg{font-size:11px;color:var(--muted);font-style:italic;margin-top:8px;text-align:center;}

/* SYMPTOM POPUP */
.sym-popup-overlay{position:fixed;inset:0;background:rgba(28,23,18,.5);backdrop-filter:blur(6px);
  z-index:300;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .3s ease;}
.sym-popup{background:var(--cream);border-radius:28px 28px 0 0;width:100%;max-width:430px;
  padding:24px 24px 40px;animation:fadeUp .4s cubic-bezier(.22,.68,0,1.2);}
.sym-popup-handle{width:36px;height:3.5px;background:var(--border);border-radius:4px;margin:0 auto 20px;}
.sym-popup-title{font-family:'Libre Baskerville',serif;font-size:20px;font-weight:400;margin-bottom:6px;}
.sym-popup-title em{font-style:italic;color:var(--terra);}
.sym-popup-sub{font-size:13px;color:var(--muted);margin-bottom:18px;line-height:1.6;}
.sym-popup-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;}
.sym-ptag{padding:9px 16px;border-radius:30px;border:1.5px solid var(--border);
  font-family:'Jost',sans-serif;font-size:13px;font-weight:500;
  cursor:pointer;background:white;color:var(--ink2);transition:all .15s;}
.sym-ptag.on{background:rgba(181,103,58,.09);border-color:var(--terra);color:var(--terra);}
.sym-active-strip{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;min-height:0;}
.sym-active-chip{padding:5px 11px;border-radius:20px;font-size:12px;font-weight:500;
  background:rgba(181,103,58,.1);border:1px solid rgba(181,103,58,.2);color:var(--terra);
  display:flex;align-items:center;gap:5px;cursor:pointer;transition:all .15s;}
.sym-active-chip:hover{background:rgba(181,103,58,.18);}
.sym-active-chip .x-ic{font-size:13px;opacity:.6;}

/* RECIPE MODAL */
.recipe-sheet{background:var(--cream);border-radius:28px 28px 0 0;width:100%;max-width:430px;
  max-height:85vh;overflow-y:auto;padding:24px 24px 44px;animation:fadeUp .35s cubic-bezier(.22,.68,0,1.2);}
.recipe-img{width:100%;height:160px;background:linear-gradient(135deg,rgba(181,103,58,.12),rgba(196,150,90,.08));
  border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:52px;margin-bottom:18px;}
.recipe-title{font-family:'Libre Baskerville',serif;font-size:20px;font-weight:400;margin-bottom:4px;}
.recipe-title em{font-style:italic;color:var(--terra);}
.recipe-meta{display:flex;align-items:center;gap:16px;margin-bottom:20px;}
.recipe-tag{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  color:var(--muted);display:flex;align-items:center;gap:4px;}
.recipe-section{font-family:'Libre Baskerville',serif;font-size:15px;font-weight:400;margin:18px 0 10px;}
.recipe-ing{display:flex;flex-direction:column;gap:8px;}
.recipe-ing-item{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg2);border-radius:10px;font-size:13px;}
.recipe-steps{display:flex;flex-direction:column;gap:10px;}
.recipe-step{display:flex;gap:12px;align-items:flex-start;}
.recipe-step-num{width:24px;height:24px;border-radius:50%;background:var(--terra);color:white;
  font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.recipe-step-txt{font-size:13px;color:var(--ink2);line-height:1.6;flex:1;}
@media(max-width:640px){
  .adm-wrap{flex-direction:column;}
  .adm-side{width:100%;height:auto;position:relative;}
  .adm-main{padding:24px 16px;}
  .adm-stats{grid-template-columns:1fr;}
  .grid2{grid-template-columns:1fr;}
  .modal-box{padding:24px;}
  .pt-card-body{grid-template-columns:repeat(2,1fr);}
}
.adm-tab-row{display:flex;gap:2px;background:var(--bg2);border-radius:14px;padding:4px;margin-bottom:28px;}
.adm-tab{flex:1;padding:9px 14px;border:none;border-radius:10px;background:none;
  font-family:'Jost',sans-serif;font-size:13px;font-weight:500;color:var(--muted);
  cursor:pointer;transition:all .2s;letter-spacing:.03em;}
.adm-tab.on{background:white;color:var(--ink);box-shadow:var(--sh-sm);font-weight:600;}

/* patient cards in admin */
.pt-card{background:white;border:1px solid var(--border2);border-radius:20px;padding:20px 24px;
  margin-bottom:14px;box-shadow:var(--sh-sm);transition:box-shadow .2s;}
.pt-card:hover{box-shadow:var(--sh-md);}
.pt-card-top{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
.pt-card-av{width:46px;height:46px;border-radius:50%;background:var(--grad);
  color:white;font-size:17px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.pt-card-info{flex:1;}
.pt-card-nm{font-size:16px;font-weight:600;color:var(--ink);}
.pt-card-mt{font-size:12px;color:var(--muted);margin-top:2px;}
.pt-card-actions{display:flex;gap:8px;align-items:center;}
.pt-card-body{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
.pt-mini-stat{background:var(--bg2);border-radius:12px;padding:12px 14px;text-align:center;}
.pt-mini-stat-v{font-family:'Libre Baskerville',serif;font-size:20px;font-weight:700;}
.pt-mini-stat-v.ex{color:var(--gold);}
.pt-mini-stat-v.med{color:var(--sage);}
.pt-mini-stat-v.ci{color:var(--terra);}
.pt-mini-stat-v.ph{color:#7a9dc4;}
.pt-mini-stat-l{font-size:10px;color:var(--muted);font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-top:3px;}
.pt-card-prog{margin-bottom:6px;}
.pt-card-prog-lbl{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px;}
.pt-card-prog-lbl strong{color:var(--terra);font-weight:600;}

/* alert banner */
.alert-banner{display:flex;align-items:center;gap:12px;background:rgba(196,120,120,.08);
  border:1px solid rgba(196,120,120,.2);border-radius:14px;padding:14px 18px;margin-bottom:10px;}

function getPhaseContent(allItems, currentPhase, countPerPhase) {
  let result = [];
  for(let ph=1; ph<=currentPhase; ph++){
    const items = allItems.filter(x=>x.phase===ph).slice(0, countPerPhase[ph-1]||3);
    result = result.concat(items);
  }
  return result;
}

// ── APP ── Firebase-powered
function App(){
  const [patients,setPatients]=useState([]);
  const [loading,setLoading]=useState(true);
  const [user,setUser]=useState(()=>{
    try{ const s=localStorage.getItem('vita_session'); if(s) return JSON.parse(s); }catch{}
    return null;
  });
  const [toast,setToast]=useState(null);
  const flash=m=>{setToast(m);setTimeout(()=>setToast(null),2600);};

  useEffect(()=>{
    const init = async () => {
      // Inicia a escuta em tempo real. Isso fará com que o app carregue os dados 
      // e os mantenha sincronizados entre navegadores.
      const unsub = window.__vita.subscribePatients(updated => {
        setPatients(updated);
        setLoading(false);
      });
      return unsub;
    };
    
    let unsubPromise;
    if(window.__vitaReady){ unsubPromise = init(); }
    else { window.addEventListener('vitaReady', () => { unsubPromise = init(); }, {once:true}); }
    
    return () => { if(unsubPromise && typeof unsubPromise.then === 'function') unsubPromise.then(u => u && u()); };
  },[]);

  const setP = (arr) => {
    // No Firebase, não precisamos de um setP global que salve tudo de uma vez.
    // As atualizações são feitas individualmente por paciente.
    setPatients(arr);
  };

  const updP = async (id,d) => {
    const existing = patients.find(p=>p.id===id);
    if(existing){
      const updated = {...existing,...d};
      try {
        await window.__vita.savePatient(updated);
        // O estado local será atualizado pelo onSnapshot (subscribePatients)
      } catch(e) {
        flash('Erro ao sincronizar dados');
        console.error(e);
      }
    }
  };

  const handleLogin=(u,remember)=>{ setUser(u); if(remember) localStorage.setItem('vita_session',JSON.stringify(u)); };
  const handleLogout=()=>{ localStorage.removeItem('vita_session'); setUser(null); };

  if(loading) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)'}}>
      <div style={{textAlign:'center'}}>
        <div style={{fontSize:40,marginBottom:16}}>🌿</div>
        <div style={{fontFamily:'Libre Baskerville,serif',fontSize:18,color:'var(--ink)',marginBottom:8}}>Bio Vitalie</div>
        <div style={{fontSize:13,color:'var(--muted)'}}>Carregando...</div>
      </div>
    </div>
  );

  if(!user) return <>{React.createElement(Login,{patients,onLogin:handleLogin,flash})}{toast&&<div className="toast">{toast}</div>}</>;
  if(user.type==='admin') return <>{React.createElement(Admin,{patients,setP,onLogout:handleLogout,flash})}{toast&&<div className="toast">{toast}</div>}</>;
  
  const pat = patients.find(p=>p.id===user.id);
  if(!pat){ handleLogout(); return null; }
  return <>{React.createElement(PatientApp,{patient:pat,upd:d=>updP(pat.id,d),onLogout:handleLogout,flash})}{toast&&<div className="toast">{toast}</div>}</>;
}

function PatientApp({patient,upd,onLogout,flash}){
  const [tab,setTab]=useState('home');
  const [ci,setCi]=useState(false);
  const todayDone=()=>{const t=new Date().toISOString().split('T')[0];return (patient.checkins||[]).some(c=>c.date===t);};
  const openCi=()=>{if(todayDone()){flash('Check-in de hoje já realizado ✦');return;}setCi(true);};
  return (
    <div className="shell">
      <div className="shell-body">
        {tab==='home'&&<HomeTab patient={patient} upd={upd} onCheckin={openCi} flash={flash}/>}
        {tab==='plano'&&<PlanoTab patient={patient} upd={upd} flash={flash}/>}
        {tab==='perfil'&&<PerfilTab patient={patient} upd={upd} onLogout={onLogout} flash={flash}/>}
      </div>
      <nav className="tab-bar">
        {[{id:'home',ic:'⌂',lb:'Início'},{id:'plano',ic:'◈',lb:'Plano'},{id:'perfil',ic:'◯',lb:'Perfil'}].map(t=>(
          <button key={t.id} className={`tab-item${tab===t.id?' on':''}`} onClick={()=>setTab(t.id)}>
            <span className="tab-icon" style={{fontFamily:'Georgia,serif'}}>{t.ic}</span>
            <span className="tab-label">{t.lb}</span>
            <div className="tab-dot"/>
          </button>
        ))}
      </nav>
      {ci&&<CheckinModal patient={patient} upd={upd} onClose={()=>setCi(false)} flash={flash}/>}
    </div>
  );
}

function HomeTab({patient,upd,onCheckin,flash}){
  const h=new Date().getHours();
  const greet=h<12?'Bom dia':h<18?'Boa tarde':'Boa noite';
  const today=new Date();
  const todayStr=today.toISOString().split('T')[0];
  const dow=today.getDay();
  const week=Array.from({length:7},(_,i)=>{const d=new Date(today);d.setDate(today.getDate()-dow+i);return d;});
  const doneSet=new Set((patient.checkins||[]).map(c=>c.date));
  const wkCnt=week.filter(d=>doneSet.has(d.toISOString().split('T')[0])).length;
  const phase=PHASES.find(p=>p.id===patient.currentPhase)||PHASES[0];
  const nextPhase=PHASES.find(p=>p.id===patient.currentPhase+1);
  const totalCI=(patient.checkins||[]).length;
  const prevPhaseDays=PHASES.filter(p=>p.id<patient.currentPhase).reduce((a,p)=>a+p.days,0);
  const phaseCI=Math.max(0,totalCI-prevPhaseDays);
  const phasePct=Math.min(Math.round((phaseCI/phase.days)*100),100);
  const daysLeft=Math.max(0,phase.days-phaseCI);

  const exercises=getPhaseContent(ALL_EXERCISES, patient.currentPhase, [3,3,3,3]);
  const meditations=getPhaseContent(ALL_MEDITATIONS, patient.currentPhase, [3,2,2,2]);
  const recipes=getPhaseContent(ALL_RECIPES, patient.currentPhase, [3,3,3,3]);

  const [doneExs,setDoneExs]=useState([]);
  const [doneMeds,setDoneMeds]=useState([]);
  const [selectedRecipe,setSelectedRecipe]=useState(null);
  const [confirmAct,setConfirmAct]=useState(null);

  const waterKey=`vita_water_${patient.id}_${todayStr}`;
  const [waterCups,setWaterCups]=useState(()=>{
    try{return JSON.parse(localStorage.getItem(waterKey)||'0');}catch{return 0;}
  });
  const MAX_WATER=12;
  const addWater=()=>{
    if(waterCups>=MAX_WATER)return;
    const n=waterCups+1;
    setWaterCups(n);
    localStorage.setItem(waterKey,JSON.stringify(n));
    if(n===8)flash('🎉 Meta diária atingida! 8 copos de água!');
    else flash(`💧 +1 copo · ${n} de ${MAX_WATER} hoje`);
  };
  const removeWater=()=>{
    if(waterCups<=0)return;
    const n=waterCups-1;
    setWaterCups(n);
    localStorage.setItem(waterKey,JSON.stringify(n));
  };
  const waterMsg=()=>{
    if(waterCups===0)return 'Beba seu primeiro copo agora 💧';
    if(waterCups<4)return `Continue! Faltam ${8-waterCups} copos para a meta`;
    if(waterCups<8)return `Boa! Faltam ${8-waterCups} copos para a meta de 8`;
    if(waterCups===8)return '🎉 Meta diária atingida!';
    return `Excelente! ${waterCups} copos hoje ✦`;
  };

  const symKey=`vita_syms_${patient.id}_${todayStr}`;
  const [todaySyms,setTodaySyms]=useState(()=>{
    try{return JSON.parse(localStorage.getItem(symKey)||'[]');}catch{return [];}
  });
  const [showSymPopup,setShowSymPopup]=useState(false);
  const [popupSelected,setPopupSelected]=useState([]);
  const seenKey=`vita_sympopup_${patient.id}_${todayStr}`;
  React.useEffect(()=>{
    if(localStorage.getItem(seenKey))return;
    const t=setTimeout(()=>setShowSymPopup(true),15000);
    return ()=>clearTimeout(t);
  },[]);

  const openSymPopup=()=>{setPopupSelected([...todaySyms]);setShowSymPopup(true);};
  const togPopupSym=s=>setPopupSelected(p=>p.includes(s)?p.filter(x=>x!==s):[...p,s]);
  const saveSyms=()=>{
    setTodaySyms(popupSelected);
    localStorage.setItem(symKey,JSON.stringify(popupSelected));
    localStorage.setItem(seenKey,'1');
    setShowSymPopup(false);
    flash(popupSelected.length>0?`${popupSelected.length} sintoma${popupSelected.length>1?'s':''} registrado${popupSelected.length>1?'s':''}  ✦`:'Sem sintomas registrados ✦');
  };
  const removeActiveSym=s=>{
    const n=todaySyms.filter(x=>x!==s);
    setTodaySyms(n);
    localStorage.setItem(symKey,JSON.stringify(n));
  };

  const handleExClick=i=>{
    if(doneExs.includes(i)){setDoneExs(p=>p.filter(x=>x!==i));return;}
    setConfirmAct({type:'ex',index:i,name:exercises[i].name,duration:exercises[i].duration,icon:exercises[i].icon});
  };
  const handleMedClick=i=>{
    if(doneMeds.includes(i)){setDoneMeds(p=>p.filter(x=>x!==i));return;}
    setConfirmAct({type:'med',index:i,name:meditations[i].name,duration:meditations[i].duration});
  };
  const confirmDo=()=>{
    if(!confirmAct)return;
    if(confirmAct.type==='ex'){
      setDoneExs(p=>[...p,confirmAct.index]);
      flash('Exercício marcado! 💪');
      upd({stats:{...(patient.stats||{}),exercises:(patient.stats?.exercises||0)+1}});
    } else {
      setDoneMeds(p=>[...p,confirmAct.index]);
      flash('Meditação marcada! 🌿');
      upd({stats:{...(patient.stats||{}),meditations:(patient.stats?.meditations||0)+1}});
    }
    setConfirmAct(null);
  };

  return (
    <div>
      <div className="home-hero a1">
        <div className="hero-top">
          <div><div className="hero-gr">{greet}</div><div className="hero-nm">{patient.name.split(' ')[0]}<em>!</em></div></div>
          <div className="hero-av">{patient.name[0]}</div>
        </div>
        <div className="cta-ci a2" onClick={onCheckin}>
          <div className="cta-ci-ic" style={{fontFamily:'Georgia,serif',color:'rgba(255,255,255,.9)'}}>✦</div>
          <div className="cta-ci-txt"><div className="cta-ci-title">Check-in do dia</div><div className="cta-ci-sub">Registre como você está se sentindo</div></div>
          <span className="cta-ci-arr">›</span>
        </div>
      </div>

      <div className="water-bar a2">
        <div className="water-bar-top">
          <div className="water-bar-title">Água de <em>hoje</em></div>
          <div className="water-count-wrap"><span className="water-count">{waterCups}</span><span className="water-count-of">/{MAX_WATER} copos</span></div>
        </div>
        <div className="water-cups">
          {Array.from({length:MAX_WATER},(_,i)=>(
            <div key={i} className={`water-cup${i<waterCups?' filled':''}`}
              onClick={i<waterCups?removeWater:addWater}
              title={i<waterCups?'Clique para remover':'Clique para adicionar'}>💧</div>
          ))}
        </div>
        <button className="water-cta" onClick={addWater} disabled={waterCups>=MAX_WATER} style={{opacity:waterCups>=MAX_WATER?.6:1}}>
          <span style={{fontSize:20}}>+</span> Bebi um copo agora
        </button>
        <div className="water-msg">{waterMsg()}</div>
      </div>

      {todaySyms.length>0&&(
        <div style={{padding:'0 24px',marginBottom:16}} className="a2">
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
            <span style={{fontSize:12,fontWeight:600,letterSpacing:'.08em',textTransform:'uppercase',color:'var(--muted)'}}>Sintomas de hoje</span>
            <button onClick={openSymPopup} style={{background:'none',border:'none',cursor:'pointer',fontSize:12,fontWeight:600,color:'var(--terra)',fontFamily:'Jost,sans-serif'}}>Editar ›</button>
          </div>
          <div className="sym-active-strip">
            {todaySyms.map(s=>(
              <div key={s} className="sym-active-chip" onClick={()=>removeActiveSym(s)}>{s}<span className="x-ic">×</span></div>
            ))}
          </div>
        </div>
      )}

      <div className="sec-pad a2"><div className="sec-hd"><span className="sec-title">Sua Jornada</span></div></div>
      <div className="j-rail a2">
        {PHASES.map(ph=>{
          const isAct=ph.id===patient.currentPhase;
          const isDone=ph.id<patient.currentPhase;
          return (
            <div key={ph.id} className={`ph-tile${isAct?' active':isDone?' done':' locked'}`}>
              {isAct&&<span className="ph-badge">Você está aqui</span>}
              {isDone&&<span className="ph-badge done-b">✓ Concluída</span>}
              <div className="ph-orb" style={{fontFamily:'Georgia,serif',fontSize:20}}>{ph.icon}</div>
              <div className="ph-nm">{ph.name}</div>
              <div className="ph-mo">{ph.months}</div>
            </div>
          );
        })}
      </div>

      <div className="j-progress-card a2" style={{marginTop:14}}>
        <div className="j-prog-top"><span className="j-prog-where">Fase atual</span><span style={{fontSize:12,fontWeight:600,color:'var(--terra)'}}>{phasePct}%</span></div>
        <div className="j-prog-phase"><em>{phase.name}</em> — {phase.months}</div>
        <div className="j-prog-next">
          {daysLeft>0 ? <>Faltam <strong>{daysLeft} dias de check-in</strong> para avançar{nextPhase?` para ${nextPhase.name}`:''}</> : <>Pronta para avançar para a próxima fase! ✦</>}
        </div>
        <div className="j-prog-bar-wrap"><div className="j-prog-bar" style={{width:`${phasePct}%`}}/></div>
        <div className="j-prog-labels"><span className="j-prog-days-done">{phaseCI} dias concluídos</span><span>{phase.days} dias totais</span></div>
      </div>

      <div className="sec-pad a3"><div className="sec-hd" style={{marginTop:20}}><span className="sec-title">Esta Semana</span></div></div>
      <div className="week-card a3">
        <div className="week-row">
          {week.map((d,i)=>{
            const ds=d.toISOString().split('T')[0];
            const isT=ds===todayStr;
            const isDn=doneSet.has(ds);
            return (
              <div key={i} className={`day-pip${isT?' today':''}${isDn&&!isT?' chkd':''}`}>
                <span style={{fontSize:9,fontWeight:600,letterSpacing:'.06em'}}>{WDAYS[i]}</span>
                <span>{d.getDate()}</span>
              </div>
            );
          })}
        </div>
        <div className="week-ft" style={{marginTop:12}}>
          <span className="week-cnt">{wkCnt}<span style={{fontSize:13,color:'var(--muted)',fontFamily:'Jost',fontWeight:400}}>/7</span></span>
          <span style={{fontSize:12,color:'var(--muted)'}}>check-ins</span>
        </div>
        <div className="week-msg">{weekMsg()}</div>
      </div>

      <div className="act-card a3" style={{marginTop:20}}>
        <div className="act-card-head"><div className="act-card-icon ex">🏃‍♀️</div><div className="act-card-q">Hoje vamos <em>praticar</em> qual exercício?</div></div>
        <div className="act-card-items">
          {exercises.map((ex,i)=>(
            <div key={i} className={`act-item${doneExs.includes(i)?' done-item':''}`} onClick={()=>handleExClick(i)}>
              <div className="act-item-ic">{ex.icon}</div>
              <div className="act-item-info"><div className="act-item-name">{ex.name}</div><div className="act-item-dur">◷ {ex.duration}</div></div>
              <div className="act-item-check">{doneExs.includes(i)?'✓':''}</div>
            </div>
          ))}
        </div>
      </div>

      <div className="act-card a3">
        <div className="act-card-head"><div className="act-card-icon med" style={{fontFamily:'Georgia,serif',fontSize:16,color:'var(--sage)',display:'flex',alignItems:'center',justifyContent:'center'}}>◇</div><div className="act-card-q">Já fez a sua <em>meditação</em>?</div></div>
        <div className="act-card-items">
          {meditations.map((m,i)=>(
            <div key={i} className={`act-item${doneMeds.includes(i)?' done-item':''}`} onClick={()=>handleMedClick(i)}>
              <div className="act-item-ic" style={{fontFamily:'Georgia,serif',fontSize:16,color:'var(--sage)',background:'rgba(107,140,110,.1)',width:36,height:36,borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center'}}>◇</div>
              <div className="act-item-info"><div className="act-item-name">{m.name}</div><div className="act-item-dur">◷ {m.duration}</div></div>
              <div className="act-item-check">{doneMeds.includes(i)?'✓':''}</div>
            </div>
          ))}
        </div>
      </div>

      <div className="act-card a4">
        <div className="act-card-head"><div className="act-card-icon food">🥗</div><div className="act-card-q">Sua <em>alimentação</em> de hoje</div></div>
        <div className="act-card-items">
          {recipes.map((r,i)=>(
            <div key={i} className="act-item" onClick={()=>setSelectedRecipe(r)}>
              <div className="act-item-ic">{r.icon}</div>
              <div className="act-item-info"><div className="act-item-name">{r.name}</div><div className="act-item-dur">◷ {r.duration} preparo</div></div>
              <span style={{color:'var(--muted)',fontSize:16}}>›</span>
            </div>
          ))}
        </div>
      </div>

      {showSymPopup&&(
        <div className="sym-popup-overlay" onClick={e=>{if(e.target.className==='sym-popup-overlay')saveSyms();}}>
          <div className="sym-popup">
            <div className="sym-popup-handle"/>
            <div className="sym-popup-title">Como estão os <em>sintomas</em> hoje?</div>
            <div className="sym-popup-sub">Selecione o que está sentindo agora.</div>
            <div className="sym-popup-grid">
              {SYMPTOMS.map(s=>(<button key={s} className={`sym-ptag${popupSelected.includes(s)?' on':''}`} onClick={()=>togPopupSym(s)}>{s}</button>))}
            </div>
            <button className="btn-reg" onClick={saveSyms}>{popupSelected.length>0?`Salvar ${popupSelected.length} sintomas ✦`:'Estou bem ✦'}</button>
          </div>
        </div>
      )}

      {selectedRecipe&&(
        <div className="overlay" onClick={e=>e.target.className==='overlay'&&setSelectedRecipe(null)}>
          <div className="recipe-sheet">
            <div className="sh-handle"/>
            <div className="recipe-img">{selectedRecipe.icon}</div>
            <div className="recipe-title"><em>{selectedRecipe.name}</em></div>
            <div className="recipe-section">Ingredientes</div>

              {(selectedRecipe.ingredients||[]).map((ing,i)=>(<div key={i} className="recipe-ing-item">✦ {ing}</div>))}
            </div>

            <div className="recipe-steps">
              {(selectedRecipe.steps||[]).map((step,i)=>(<div key={i} className="recipe-step"><div className="recipe-step-num">{i+1}</div><div className="recipe-step-txt">{step}</div></div>))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function CheckinModal({patient,upd,onClose,flash}){
  const [mood,setMood]=useState('');
  const [energy,setEnergy]=useState(0);
  const [sleep,setSleep]=useState(0);
  const [water,setWater]=useState(6);
  const [syms,setSyms]=useState([]);
  const [exD,setExD]=useState(false);
  const [medD,setMedD]=useState(false);
  const [notes,setNotes]=useState('');
  const togSym=s=>setSyms(p=>p.includes(s)?p.filter(x=>x!==s):[...p,s]);
  const submit=async()=>{
    const today=new Date().toISOString().split('T')[0];
    const ci={date:today,mood,energy,sleep,water,symptoms:syms,exerciseDone:exD,meditationDone:medD,notes};
    const checkins=[...(patient.checkins||[]),ci];
    const stats={...(patient.stats||{}),checkins:(patient.stats?.checkins||0)+1,exercises:(patient.stats?.exercises||0)+(exD?1:0),meditations:(patient.stats?.meditations||0)+(medD?1:0)};
    const ph=PHASES.find(p=>p.id===patient.currentPhase)||PHASES[0];
    let cp=patient.currentPhase;
    let ul=[...(patient.unlockedPhases||[1])];
    if(checkins.length>=ph.days&&cp<4){cp++;if(!ul.includes(cp))ul.push(cp);flash(`✦ Fase ${cp} desbloqueada!`);}
    await upd({checkins,stats,currentPhase:cp,unlockedPhases:ul});
    flash('Dia registrado com sucesso ✦');
    onClose();
  };
  return (
    <div className="overlay" onClick={e=>e.target.className==='overlay'&&onClose()}>
      <div className="sheet">
        <div className="sh-handle"/><div className="sh-title">Check-in do Dia</div>
        <span className="f-lbl">Humor</span>
        <div className="mood-strip">
          {MOODS.map(m=>(<button key={m.l} className={`mood-btn${mood===m.l?' sel':''}`} onClick={()=>setMood(m.l)}><span className="mood-em">{m.e}</span><span className="mood-lb">{m.l}</span></button>))}
        </div>
        <div className="scale-grid">
          <div><div className="scale-ttl">☀ Energia</div><div className="sq-row">{[1,2,3,4,5].map(n=><div key={n} className={`sq e${n<=energy?' on':''}`} onClick={()=>setEnergy(n)}/>)}</div></div>
          <div><div className="scale-ttl">◑ Sono</div><div className="sq-row">{[1,2,3,4,5].map(n=><div key={n} className={`sq s${n<=sleep?' on':''}`} onClick={()=>setSleep(n)}/>)}</div></div>
        </div>
        <div className="sl-block"><div className="sl-lbl">◈ Água (copos) <span className="sl-val">{water} copos</span></div><input type="range" min={0} max={12} value={water} onChange={e=>setWater(+e.target.value)}/></div>
        <button className="btn-reg" onClick={submit}>Registrar dia</button>
      </div>
    </div>
  );
}

      <div className="sec-pad a4"><div className="sec-hd"><span className="sec-title">Plano Alimentar</span></div></div>
      <div className="food-panel a4"><div className="food-ph can">✓ Pode comer</div><div className="food-pb">{(patient.canEat||[]).map((f,i)=><span key={i} className="food-pill can">{f}</span>)}</div></div>
      <div className="food-panel a4"><div className="food-ph cant">✕ Evitar</div><div className="food-pb">{(patient.cantEat||[]).map((f,i)=><span key={i} className="food-pill cant">{f}</span>)}</div></div>
    </div>
  );
}

function PerfilTab({patient,upd,onLogout,flash}){
  const [dob,setDob]=useState(patient.dob||'');
  const [hp,setHp]=useState(patient.hormonalPhase||'');
  const s=patient.stats||{exercises:0,meditations:0,recipes:0,checkins:0};
  const save=()=>{upd({dob,hormonalPhase:hp});flash('Perfil salvo ✦');};
  return (
    <div>
      <div className="perf-hero a1"><div className="perf-av">{patient.name[0]}</div><div><div className="perf-nm">{patient.name}</div><div className="perf-em">{patient.email}</div></div></div>
      <div className="stats-strip a2">
        {[{v:s.exercises,l:'Exercícios',c:'ex'},{v:s.meditations,l:'Meditações',c:'med'},{v:s.checkins,l:'Check-ins',c:'chk'}].map(st=>(<div key={st.l} className="stat-tile"><div className={`stat-v ${st.c}`}>{st.v}</div><div className="stat-l">{st.l}</div></div>))}
      </div>
      <div className="perf-body a3">
        <div className="fl"><label>Data de Nascimento</label><input className="fi" type="date" value={dob} onChange={e=>setDob(e.target.value)}/></div>
        <button className="btn-t" onClick={save}>Salvar perfil</button>
        <button className="logout-lnk" onClick={onLogout}>↪ Sair da conta</button>
      </div>
    </div>
  );
}

function Admin({patients,setP,onLogout,flash}){
  const [sec,setSec]=useState('dashboard');
  const [modal,setModal]=useState(null);
  const [detailP,setDetailP]=useState(null);
  const [advConfirm,setAdvConfirm]=useState(null);

  const updP=(id,d)=>{
    const existing = patients.find(p=>p.id===id);
    if(existing){
      window.__vita.savePatient({...existing,...d}).catch(console.error);
    }
  };

  const saveNewPatient=(data)=>{
    const newP = {...data, id:'p'+Date.now(), checkins: [], stats: {exercises:0,meditations:0,checkins:0}};
    window.__vita.savePatient(newP).catch(console.error);
    flash('Paciente criada ✦');
  };

  const delP=id=>{
    if(!confirm('Remover permanentemente?'))return;
    window.__vita.deletePatient(id).catch(console.error);
    flash('Paciente removida');
  };

  const alerts=patients.filter(p=>{
    const ci=p.checkins||[];
    if(!ci.length)return true;
    const diff=(new Date()-new Date(ci[ci.length-1].date))/(1000*60*60*24);
    return diff>=3;
  });

  return (
    <div className="adm-wrap">
      <div className="adm-side">
        <div className="adm-brand"><div className="adm-brand-nm">Vita</div></div>
        <button className={`adm-nb${sec==='dashboard'?' on':''}`} onClick={()=>setSec('dashboard')}>Dashboard</button>
        <button className={`adm-nb${sec==='patients'?' on':''}`} onClick={()=>setSec('patients')}>Pacientes</button>
        <button className="adm-nb" onClick={onLogout}>Sair</button>
      </div>
      <div className="adm-main">
        {sec==='dashboard' && <ADash patients={patients} onViewDetail={setDetailP} onAlert={()=>setSec('alerts')}/>}
        {sec==='patients' && <APatients patients={patients} onNew={()=>setModal('new')} onEdit={p=>setModal(p)} onDel={delP} onAdvance={id=>setAdvConfirm(id)} onViewDetail={setDetailP}/>}
      </div>
      {modal && <PatientModal patient={modal==='new'?null:modal} onClose={()=>setModal(null)} onSave={d=>{if(modal==='new')saveNewPatient(d);else updP(modal.id,d);setModal(null);}}/>}
      {detailP && <PatientDetail patient={patients.find(p=>p.id===detailP)} onClose={()=>setDetailP(null)} onEdit={p=>{setDetailP(null);setModal(p);}} onAdvance={id=>setAdvConfirm(id)}/>}
    </div>
  );
}

// ── COMPONENTES ADMIN ADICIONAIS ──
function PatientModal({patient,onClose,onSave}){
  const [form,setForm]=useState(patient||{name:'',cpf:'',email:'',password:'vita@2024',currentPhase:1,canEat:[],cantEat:[],supplements:[],exams:[]});
  const fmt=v=>{const n=v.replace(/\D/g,'').slice(0,11);return n.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/,'$1.$2.$3-$4').replace(/(\d{3})(\d{3})(\d{3})/,'$1.$2.$3').replace(/(\d{3})(\d{3})/,'$1.$2').replace(/(\d{3})/,'$1');};
  return (
    <div className="modal-bg">
      <div className="modal-box">
        <div className="modal-hd"><h2 className="modal-ttl">{patient?'Editar':'Nova'} Paciente</h2><button className="modal-cls" onClick={onClose}>✕</button></div>
        <div className="grid2">
          <div className="fl"><label>Nome</label><input className="fi" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/></div>
          <div className="fl"><label>CPF</label><input className="fi" value={form.cpf} onChange={e=>setForm({...form,cpf:fmt(e.target.value)})}/></div>
        </div>
        <button className="btn-t" onClick={()=>onSave(form)}>Salvar</button>
      </div>
    </div>
  );
}

function PatientDetail({patient,onClose,onEdit,onAdvance}){
  const ph=PHASES.find(x=>x.id===patient.currentPhase)||PHASES[0];
  const pct=Math.min(Math.round(((patient.checkins?.length||0)/ph.days)*100),100);
  return (
    <div className="modal-bg">
      <div className="modal-box">
        <div className="modal-hd"><h2>{patient.name}</h2><button className="modal-cls" onClick={onClose}>✕</button></div>
        <div className="pt-card-prog-lbl"><span>{ph.name}</span> <strong>{pct}%</strong></div>
        <div className="prog-wrap"><div className="prog-fill" style={{width:`${pct}%`}}/></div>
        <div style={{marginTop:20}}><button className="btn btn-sec" onClick={()=>onEdit(patient)}>Editar Cadastro</button></div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
