<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bio Vitalie — Saúde Integrativa</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyB8KlzpO2EGiyKon6gmG7C-KVDbYRg9ua8",
    authDomain: "biovitalie-3d35b.firebaseapp.com",
    projectId: "biovitalie-3d35b",
    storageBucket: "biovitalie-3d35b.appspot.com",
    messagingSenderId: "1028355606477",
    appId: "1:1028355606477:web:8a37955c42171c7d89069d"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const auth = firebase.auth();
  auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

  window.__vita = {
    db,
    auth,
    savePatient: async (patient) => {
      await db.collection("patients").doc(patient.id).set(patient, { merge: true });
    },
    deletePatient: async (id) => {
      await db.collection("patients").doc(id).delete();
    },
    subscribePatients: (cb) => {
      return db.collection("patients").onSnapshot(snap => {
        cb(snap.docs.map(d => ({ id: d.id, ...d.data() })));
      });
    }
  };
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<style>
/* Reset e Variáveis */
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --ink:#1c1712;--ink2:#3d3529;--ink3:#6b5f52;--muted:#a09181;
  --border:#e8dfd4;--border2:#f0e8df;--bg:#faf6f1;--bg2:#f4ede3;
  --card:#ffffff;--cream:#fdf8f2;
  --terra:#b5673a;--terra2:#d4845a;--terra3:#8c4e2a;
  --gold:#c4965a;--gold2:#d4aa78;
  --rose:#c47878;--sage:#6b8c6e;
  --grad:linear-gradient(135deg,#b5673a,#c4965a);
  --sh-sm:0 2px 12px rgba(28,23,18,.06);
  --sh-md:0 8px 32px rgba(28,23,18,.1);
  --sh-lg:0 20px 60px rgba(28,23,18,.15);
}
body{font-family:'Jost',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;}
::-webkit-scrollbar{width:3px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* Estilos de Login */
.lg-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg);}
.lg-card{background:var(--card);border-radius:28px;padding:52px 48px;width:100%;max-width:420px;box-shadow:var(--sh-lg);border:1px solid var(--border2);}
.lg-logotype{display:flex;align-items:center;gap:14px;margin-bottom:40px;}
.lg-emblem{width:46px;height:46px;background:var(--grad);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.lg-brand{font-family:'Libre Baskerville',serif;font-size:22px;color:var(--ink);letter-spacing:.02em;}
.lg-brand span{display:block;font-family:'Jost',sans-serif;font-size:10px;font-weight:500;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-top:2px;}
.lg-h1{font-family:'Libre Baskerville',serif;font-size:26px;font-weight:400;line-height:1.3;margin-bottom:6px;}
.lg-h1 em{font-style:italic;color:var(--terra);}
.lg-sub{font-size:13px;color:var(--muted);margin-bottom:32px;}
.fl{margin-bottom:18px;}
.fl label{display:block;font-size:10px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.fi{width:100%;padding:14px 18px;border:1.5px solid var(--border);border-radius:12px;background:var(--bg);font-family:'Jost',sans-serif;font-size:14px;outline:none;}
.fi:focus{border-color:var(--terra);}
.btn-t{width:100%;padding:15px;background:var(--grad);border:none;border-radius:12px;font-family:'Jost',sans-serif;font-size:14px;font-weight:600;color:white;cursor:pointer;box-shadow:0 6px 24px rgba(181,103,58,.35);}

/* Shell e Abas */
.shell{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--bg);}
.shell-body{flex:1;overflow-y:auto;padding-bottom:84px;}
.tab-bar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(253,248,242,.95);backdrop-filter:blur(20px);border-top:1px solid var(--border2);display:flex;padding:10px 0 16px;z-index:100;}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;}
.tab-item.on .tab-label{color:var(--terra);}

/* Home Tab */
.home-hero{padding:32px 24px 24px;background:linear-gradient(180deg,var(--bg2) 0%,var(--bg) 100%);}
.hero-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:24px;}
.hero-av{width:44px;height:44px;border-radius:50%;background:var(--grad);color:white;display:flex;align-items:center;justify-content:center;font-weight:600;}
.cta-ci{display:flex;align-items:center;gap:16px;background:linear-gradient(135deg,#c4845a,#d4a870);border-radius:20px;padding:18px 22px;cursor:pointer;color:white;}

/* Admin */
.adm-wrap{display:flex;min-height:100vh;}
.adm-side{width:230px;background:var(--ink);flex-shrink:0;padding:36px 0;display:flex;flex-direction:column;}
.adm-nb{display:flex;align-items:center;gap:12px;padding:12px 24px;color:rgba(255,255,255,.45);cursor:pointer;background:none;border:none;width:100%;text-align:left;}
.adm-nb.on{color:white;background:rgba(181,103,58,.12);border-left:3px solid var(--terra);}
.pt-card{background:white;border-radius:20px;padding:24px;margin-bottom:18px;box-shadow:var(--sh-sm);}

/* Water Tracker */
.water-bar{margin:0 24px 16px;background:white;border-radius:20px;padding:18px 20px;border:1px solid var(--border2);}
.water-cup{width:34px;height:34px;border-radius:9px;border:1.5px solid #4a90d933;display:inline-flex;align-items:center;justify-content:center;margin:2px;cursor:pointer;font-size:16px;}
.water-cup.filled{background:#4a90d922;border-color:#4a90d9;}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(28,23,18,.6);backdrop-filter:blur(6px);z-index:300;display:flex;align-items:center;justify-content:center;padding:24px;}
.modal-box{background:var(--cream);border-radius:24px;width:100%;max-width:580px;max-height:88vh;overflow-y:auto;padding:36px;}
.prog-wrap{width:100%;height:6px;background:var(--bg2);border-radius:10px;overflow:hidden;}
.prog-fill{height:100%;background:var(--grad);transition:width .4s;}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

// ── CONFIGURAÇÕES FIXAS ──
const PHASES = [
  {id:1, name:'Autoconhecimento', months:'1–3', icon:'✦', days:90, desc:'Entendimento inicial do corpo e mapeamento de sintomas.'},
  {id:2, name:'Desparasitação', months:'4–6', icon:'◈', days:90, desc:'Limpeza profunda e remoção de toxinas.'},
  {id:3, name:'Detoxificação', months:'7–9', icon:'◇', days:90, desc:'Purificação do fígado e intestino.'},
  {id:4, name:'Energização', months:'10–12', icon:'◉', days:90, desc:'Reconstrução celular e vitalidade.'},
];

// ── COMPONENTE PRINCIPAL ──
function App() {
  const [patients, setPatients] = useState([]);
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  const [toast, setToast] = useState(null);

  const flash = m => { setToast(m); setTimeout(() => setToast(null), 2600); };

  useEffect(() => {
    // Sincronização em tempo real com Firebase
    const unsub = window.__vita.subscribePatients(data => {
      setPatients(data);
      setLoading(false);
    });

    // Restaurar sessão
    const saved = localStorage.getItem('vita_session');
    if (saved) setUser(JSON.parse(saved));

    return () => unsub();
  }, []);

  const handleLogin = (u, remember) => {
    setUser(u);
    if (remember) localStorage.setItem('vita_session', JSON.stringify(u));
  };

  const handleLogout = () => {
    localStorage.removeItem('vita_session');
    setUser(null);
  };

  if (loading) return <div style={{padding:100, textAlign:'center'}}>🌿 Bio Vitalie...</div>;

  if (!user) return <Login patients={patients} onLogin={handleLogin} flash={flash} />;
  
  if (user.type === 'admin') return <Admin patients={patients} onLogout={handleLogout} flash={flash} />;

  const pat = patients.find(p => p.id === user.id);
  if (!pat) { handleLogout(); return null; }

  return <PatientApp patient={pat} onLogout={handleLogout} flash={flash} />;
}

// ── ÁREA DO PACIENTE ──
function PatientApp({ patient, onLogout, flash }) {
  const [tab, setTab] = useState('home');
  const [showCi, setShowCi] = useState(false);
  
  const todayStr = new Date().toISOString().split('T')[0];
  const waterKey = `water_${patient.id}_${todayStr}`;
  const [water, setWater] = useState(() => Number(localStorage.getItem(waterKey) || 0));

  const phase = PHASES.find(p => p.id === (patient.currentPhase || 1));
  const checkins = patient.checkins || [];
  const progressPct = Math.min(Math.round((checkins.length / phase.days) * 100), 100);

  const addWater = () => {
    const n = Math.min(water + 1, 12);
    setWater(n);
    localStorage.setItem(waterKey, n);
    if (n === 8) flash('🎉 Meta atingida!');
  };

  return (
    <div className="shell">
      <div className="shell-body">
        <div style={{padding:'40px 24px 20px', display:'flex', justifyContent:'space-between', alignItems:'center'}}>
          <div><p style={{fontSize:12, color:'#999'}}>BEM-VINDA</p><h2 style={{fontFamily:'Libre Baskerville'}}>{patient.name?.split(' ')[0]}!</h2></div>
          <div className="hero-av">{patient.name?.[0]}</div>
        </div>

        <div className="cta-ci" style={{margin:'0 24px 20px'}} onClick={() => flash('Funcionalidade em breve!')}>
           <p style={{fontWeight:600}}>Check-in do dia</p>
           <span>✦</span>
        </div>

        <div style={{padding:'0 24px'}}>
           <div className="pt-card">
              <p style={{fontSize:11, fontWeight:700, color: 'var(--terra)', textTransform:'uppercase'}}>Fase {phase.id}: {phase.name}</p>
              <div className="prog-bar"><div className="prog-fill" style={{width: `${progressPct}%`}}></div></div>
              <p style={{fontSize:12, color:'#666', marginTop:8}}>{progressPct}% concluído • {checkins.length}/{phase.days} dias</p>
           </div>

           <div className="water-bar">
              <div style={{display:'flex', justifyContent:'space-between', marginBottom:12}}>
                <strong>Água de hoje</strong>
                <span style={{fontSize:13, color:'#4a90d9', fontWeight:600}}>{water}/12 copos</span>
              </div>
              <div style={{marginBottom:15}}>
                {Array.from({length:12}).map((_, i) => (
                  <div key={i} className={`water-cup ${i < water ? 'filled' : ''}`} onClick={addWater}>💧</div>
                ))}
              </div>
              <button onClick={addWater} className="btn-t" style={{padding:10, fontSize:12, background:'#4a90d9', width:'100%', border:'none'}}>+ Beber Água</button>
           </div>
        </div>
      </div>
      <nav className="tab-bar">
        <button className={`tab-item ${tab==='home'?'on':''}`} onClick={()=>setTab('home')}>Início</button>
        <button className="tab-item" onClick={onLogout}>Sair</button>
      </nav>
    </div>
  );
}

// ── ÁREA DO ADMIN ──
function Admin({ patients, onLogout, flash }) {
  const [modal, setModal] = useState(null);

  const handleSave = async (data) => {
    await window.__vita.savePatient(data);
    setModal(null);
    flash('Dados sincronizados em todos os dispositivos! ✦');
  };

  const handleAdvance = async (p) => {
    if(p.currentPhase >= 4) return flash("Fase máxima atingida");
    const updated = { ...p, currentPhase: (p.currentPhase || 1) + 1 };
    await window.__vita.savePatient(updated);
    flash("Paciente evoluída com sucesso!");
  };

  const handleDelete = async (id) => {
    if(confirm("Excluir paciente permanentemente?")) {
      await window.__vita.deletePatient(id);
      flash("Paciente removida.");
    }
  };

  return (
    <div className="adm-wrap">
      <div className="adm-side">
        <div style={{padding:'0 24px 30px'}}><h3 style={{color:'white'}}>Vita Admin</h3></div>
        <button className="adm-nb on">Pacientes</button>
        <button className="adm-nb" onClick={onLogout}>Sair</button>
      </div>
      <div className="adm-main">
        <div style={{display:'flex', justifyContent:'space-between', marginBottom:30}}>
          <h1>Gestão Clínida</h1>
          <button className="btn-t" style={{width:'auto', padding:'10px 25px'}} onClick={() => setModal('new')}>+ Nova Paciente</button>
        </div>
        
        {patients.map(p => (
          <div key={p.id} className="pt-card" style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
            <div>
              <strong>{p.name}</strong><br/>
              <small>{p.email} • Fase {p.currentPhase}</small>
            </div>
            <div style={{display:'flex', gap:10}}>
              <button className="btn-sec" onClick={() => setModal(p)}>Editar</button>
              <button className="btn-sec" onClick={() => handleAdvance(p)}>Evoluir</button>
              <button className="btn-sec" style={{color:'red'}} onClick={() => handleDelete(p.id)}>✕</button>
            </div>
          </div>
        ))}

        {modal && <PatientModal patient={modal === 'new' ? null : modal} onClose={() => setModal(null)} onSave={handleSave} />}
      </div>
    </div>
  );
}

// ── COMPONENTES AUXILIARES ──
function Login({ patients, onLogin, flash }) {
  const [email, setEmail] = useState('');
  const [pw, setPw] = useState('');
  const [isAdmin, setIsAdmin] = useState(false);

  const handleGo = () => {
    if (isAdmin) {
      if (email === 'admin' && pw === 'admin123') onLogin({ type: 'admin' }, true);
      else flash('Admin incorreto');
      return;
    }
    const p = patients.find(x => x.email === email && x.password === pw);
    if (p) onLogin({ type: 'patient', id: p.id }, true);
    else flash('Credenciais inválidas');
  };

  return (
    <div className="lg-bg">
      <div className="lg-card">
        <h2 style={{textAlign:'center', marginBottom:20}}>Bio Vitalie</h2>
        <input className="fi" placeholder="E-mail" value={email} onChange={e=>setEmail(e.target.value)} />
        <input className="fi" type="password" placeholder="Senha" value={pw} onChange={e=>setPw(e.target.value)} />
        <button className="btn-t" onClick={handleGo} style={{width:'100%'}}>Entrar</button>
        <button onClick={() => setIsAdmin(!isAdmin)} style={{background:'none', border:'none', width:'100%', marginTop:15, color:'#aaa', fontSize:11}}>
          {isAdmin ? 'Voltar para Paciente' : 'Acesso Clínica'}
        </button>
      </div>
    </div>
  );
}

function PatientModal({ patient, onClose, onSave }) {
  const [form, setForm] = useState(patient || { name: '', email: '', password: 'vita@2026', currentPhase: 1, checkins: [] });
  return (
    <div className="modal-bg">
      <div className="modal-box">
        <h2>{patient ? 'Editar' : 'Nova'} Paciente</h2>
        <input className="fi" placeholder="Nome" value={form.name} onChange={e=>setForm({...form, name:e.target.value})} />
        <input className="fi" placeholder="E-mail" value={form.email} onChange={e=>setForm({...form, email:e.target.value})} />
        <select className="fi" value={form.currentPhase} onChange={e=>setForm({...form, currentPhase: Number(e.target.value)})}>
          {PHASES.map(ph => <option key={ph.id} value={ph.id}>Fase {ph.id} - {ph.name}</option>)}
        </select>
        <div style={{display:'flex', gap:10, marginTop:20}}>
          <button className="btn-t" style={{flex:1}} onClick={() => onSave({ ...form, id: form.id || 'p' + Date.now() })}>Salvar</button>
          <button className="btn-t" style={{flex:1, background:'#eee', color:'#666'}} onClick={onClose}>Cancelar</button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
